<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a2e1a">
<title>Catskill Fly — Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --forest:    #1a2e1a;
    --moss:      #2e4a2a;
    --fern:      #3d6b36;
    --sage:      #6a9c5f;
    --mist:      #c8dfc4;
    --cream:     #f5f0e8;
    --water:     #2a4a5e;
    --amber:     #c9843a;
    --stone:     #7a7060;
    --parchment: #ede8dc;
    --ink:       #1e1c18;
    --card-bg:   #ffffff;
    --border:    rgba(50,70,40,0.15);
    --shadow:    0 2px 16px rgba(26,46,26,0.08);
    --radius:    14px;
    --font-serif: 'Playfair Display', Georgia, serif;
    --font-sans:  'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font-sans);
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 90px;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(160deg, var(--forest) 0%, var(--moss) 60%, var(--water) 100%);
    padding: 52px 20px 32px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute; inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 28px;
    background: var(--cream);
    clip-path: ellipse(55% 100% at 50% 100%);
  }
  .header-inner {
    position: relative;
    max-width: 600px;
    margin: 0 auto;
    display: flex;
    align-items: flex-start;
    gap: 16px;
  }
  .avatar {
    width: 64px; height: 64px;
    border-radius: 50%;
    background: var(--fern);
    border: 3px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-serif);
    font-size: 24px;
    color: white;
    flex-shrink: 0;
    overflow: hidden;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .profile-info { flex: 1; }
  .profile-name {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 600;
    color: var(--cream);
    margin-bottom: 3px;
  }
  .profile-sub {
    font-size: 13px;
    color: var(--mist);
    opacity: 0.8;
    margin-bottom: 10px;
  }
  .edit-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 12px;
    color: var(--mist);
    cursor: pointer;
    font-family: var(--font-sans);
    transition: background 0.2s;
  }
  .edit-btn:active { background: rgba(255,255,255,0.2); }

  /* ── PAGE BODY ── */
  .page-body { max-width: 600px; margin: 0 auto; padding: 20px 14px; }

  /* ── STATS ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 18px;
  }
  .stat-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-num {
    font-family: var(--font-serif);
    font-size: 20px;
    font-weight: 600;
    color: var(--forest);
    line-height: 1;
    margin-bottom: 3px;
  }
  .stat-label {
    font-size: 10px;
    color: var(--stone);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* ── SECTION ── */
  .section-heading {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    margin-top: 4px;
  }
  .section-heading h2 {
    font-family: var(--font-serif);
    font-size: 17px;
    font-weight: 600;
    color: var(--forest);
  }
  .section-heading a {
    font-size: 12px;
    color: var(--fern);
    text-decoration: none;
    cursor: pointer;
  }

  /* ── TOP FLIES ── */
  .top-flies {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .fly-row {
    display: flex;
    align-items: center;
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .fly-row:last-child { border-bottom: none; }
  .fly-rank {
    font-size: 12px;
    font-weight: 500;
    color: var(--stone);
    width: 18px;
    flex-shrink: 0;
  }
  .fly-name { flex: 1; font-size: 14px; color: var(--ink); font-weight: 500; }
  .fly-count { font-size: 13px; color: var(--fern); font-weight: 500; }
  .fly-bar-wrap { width: 60px; height: 4px; background: var(--parchment); border-radius: 2px; }
  .fly-bar { height: 100%; background: var(--fern); border-radius: 2px; }

  /* ── TRIP LIST ── */
  .trip-list { display: flex; flex-direction: column; gap: 10px; }
  .trip-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px;
    cursor: pointer;
    transition: transform 0.15s;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    animation: fadeIn 0.3s ease both;
  }
  .trip-card:active { transform: scale(0.99); }
  @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
  .trip-river {
    font-family: var(--font-serif);
    font-size: 15px;
    font-weight: 600;
    color: var(--forest);
    margin-bottom: 3px;
  }
  .trip-meta { font-size: 12px; color: var(--stone); line-height: 1.6; }
  .trip-right { text-align: right; }
  .trip-fish {
    font-family: var(--font-serif);
    font-size: 18px;
    font-weight: 600;
    color: var(--fern);
    line-height: 1;
  }
  .trip-fish small { font-family: var(--font-sans); font-size: 10px; color: var(--stone); display: block; font-weight: 400; }
  .trip-rating { display: flex; gap: 1px; justify-content: flex-end; margin-top: 4px; }
  .tstar { font-size: 12px; color: #ddd; }
  .tstar.lit { color: var(--amber); }
  .vis-badge {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 8px;
    border: 1px solid var(--border);
    color: var(--stone);
    background: var(--parchment);
    display: inline-block;
    margin-top: 4px;
  }

  /* ── HATCH CHART ── */
  .hatch-chart {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 14px;
    margin-bottom: 16px;
  }
  .hatch-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .hatch-item:last-child { margin-bottom: 0; }
  .hatch-name { font-size: 13px; color: var(--ink); width: 130px; flex-shrink: 0; }
  .hatch-bar-wrap { flex: 1; height: 6px; background: var(--parchment); border-radius: 3px; }
  .hatch-bar { height: 100%; background: var(--amber); border-radius: 3px; }
  .hatch-num { font-size: 12px; color: var(--stone); width: 24px; text-align: right; flex-shrink: 0; }

  /* ── EDIT PROFILE SHEET ── */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
    display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .sheet-overlay.open { opacity: 1; pointer-events: all; }
  .edit-sheet {
    background: var(--cream);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    padding: 0 0 40px;
  }
  .sheet-overlay.open .edit-sheet { transform: translateY(0); }
  .sheet-handle { display: flex; justify-content: center; padding: 12px 0 8px; }
  .sheet-handle div { width: 36px; height: 4px; background: var(--border); border-radius: 2px; }
  .edit-sheet h3 {
    font-family: var(--font-serif);
    font-size: 20px; font-weight: 600;
    color: var(--forest);
    padding: 0 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .edit-body { padding: 16px 20px; }
  .edit-body label {
    display: block;
    font-size: 12px; font-weight: 500;
    letter-spacing: 0.05em; color: var(--stone);
    text-transform: uppercase;
    margin-bottom: 6px; margin-top: 14px;
  }
  .edit-body label:first-child { margin-top: 0; }
  .edit-body input, .edit-body textarea {
    width: 100%;
    font-family: var(--font-sans); font-size: 15px;
    color: var(--ink);
    background: var(--parchment);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .edit-body input:focus, .edit-body textarea:focus {
    border-color: var(--fern);
    box-shadow: 0 0 0 3px rgba(61,107,54,0.12);
    background: white;
  }
  .edit-body textarea { resize: none; min-height: 80px; line-height: 1.5; }
  .save-btn {
    width: 100%; padding: 14px;
    background: var(--forest); color: var(--cream);
    font-family: var(--font-serif); font-size: 16px; font-weight: 600;
    border: none; border-radius: 12px; cursor: pointer;
    margin-top: 20px;
    transition: background 0.2s, transform 0.1s;
    box-shadow: 0 4px 16px rgba(26,46,26,0.25);
  }
  .save-btn:active { transform: scale(0.98); }

  /* Sign out */
  .signout-btn {
    width: 100%; padding: 13px;
    background: transparent;
    border: 1px solid rgba(180,60,60,0.25);
    border-radius: 10px;
    color: #b44040; font-family: var(--font-sans); font-size: 14px;
    cursor: pointer; margin-top: 10px;
    transition: background 0.2s;
  }
  .signout-btn:active { background: rgba(180,60,60,0.06); }

  /* ── LOADING ── */
  .loading {
    display: flex; flex-direction: column; align-items: center;
    padding: 36px; gap: 10px; color: var(--stone); font-size: 13px;
  }
  .spinner {
    width: 26px; height: 26px;
    border: 2px solid var(--border); border-top-color: var(--fern);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── NAV BAR ── */
  .nav-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card-bg);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 10px 0 max(10px, env(safe-area-inset-bottom));
    z-index: 100;
    box-shadow: 0 -4px 20px rgba(26,46,26,0.08);
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    font-size: 10px; font-weight: 500;
    color: var(--stone); text-decoration: none;
    cursor: pointer; transition: color 0.15s;
    letter-spacing: 0.04em; text-transform: uppercase;
  }
  .nav-item.active { color: var(--fern); }
  .nav-log {
    width: 44px; height: 44px;
    background: var(--forest); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-top: -20px;
    box-shadow: 0 4px 14px rgba(26,46,26,0.35);
    border: 3px solid var(--cream);
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="avatar" id="avatar">?</div>
    <div class="profile-info">
      <div class="profile-name" id="profile-name">Loading…</div>
      <div class="profile-sub" id="profile-sub"></div>
      <button class="edit-btn" onclick="openEdit()">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        Edit profile
      </button>
    </div>
  </div>
</div>

<div class="page-body">

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="stat-trips">—</div><div class="stat-label">Trips</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-fish">—</div><div class="stat-label">Fish</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-rivers">—</div><div class="stat-label">Rivers</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-year">—</div><div class="stat-label">This year</div></div>
  </div>

  <!-- TOP FLIES -->
  <div class="section-heading"><h2>Top flies</h2></div>
  <div class="top-flies" id="top-flies">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <!-- HATCH JOURNAL -->
  <div class="section-heading"><h2>Hatch journal</h2></div>
  <div class="hatch-chart" id="hatch-chart">
    <div class="loading"><div class="spinner"></div></div>
  </div>

  <!-- MY TRIPS -->
  <div class="section-heading">
    <h2>My trips</h2>
    <span id="trip-count" style="font-size:12px;color:var(--stone)"></span>
  </div>
  <div class="trip-list" id="trip-list">
    <div class="loading"><div class="spinner"></div>Loading your trips…</div>
  </div>

  <button class="signout-btn" onclick="resetPassword()">Change password</button>
  <button class="signout-btn" onclick="signOut()" style="margin-top:6px">Sign out</button>

</div>

<!-- EDIT PROFILE SHEET -->
<div class="sheet-overlay" id="edit-overlay" onclick="closeEditIfBg(event)">
  <div class="edit-sheet">
    <div class="sheet-handle"><div></div></div>
    <h3>Edit profile</h3>
    <div class="edit-body">
      <label>Display name</label>
      <input type="text" id="edit-name" placeholder="Your name">
      <label>Bio</label>
      <textarea id="edit-bio" placeholder="A few words about your fishing…"></textarea>
      <label>Home river</label>
      <input type="text" id="edit-river" placeholder="e.g. Beaverkill">
      <button class="save-btn" onclick="saveProfile()">Save profile</button>
    </div>
  </div>
</div>

<!-- PASSWORD RESET SHEET -->
<div class="sheet-overlay" id="password-overlay" onclick="closePasswordIfBg(event)">
  <div class="edit-sheet">
    <div class="sheet-handle"><div></div></div>
    <h3>Change password</h3>
    <div class="edit-body">
      <label>New password</label>
      <input type="password" id="new-password" placeholder="At least 6 characters" autocomplete="new-password">
      <label>Confirm new password</label>
      <input type="password" id="confirm-password" placeholder="Repeat new password" autocomplete="new-password">
      <div id="password-error" style="display:none;margin-top:10px;padding:10px 12px;background:#fdf0f0;border:1px solid rgba(180,60,60,0.2);border-radius:8px;font-size:13px;color:#b44040"></div>
      <div id="password-success" style="display:none;margin-top:10px;padding:10px 12px;background:#e8f4e5;border:1px solid rgba(61,107,54,0.2);border-radius:8px;font-size:13px;color:var(--fern)"></div>
      <button class="save-btn" onclick="saveNewPassword()">Update password</button>
      <div style="text-align:center;margin-top:12px">
        <span style="font-size:13px;color:var(--stone);cursor:pointer;text-decoration:underline" onclick="sendResetEmail()">
          Or send a reset link to my email instead
        </span>
      </div>
    </div>
  </div>
</div>

<!-- NAV BAR -->
<nav class="nav-bar">
  <a class="nav-item" href="index.html" style="text-decoration:none">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>

    Discover
  </a>
  <a class="nav-item" href="fishing-log.html" style="text-decoration:none">
    <div class="nav-log">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>

  </a>

    Map
  </div>
  <div class="nav-item active">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Profile
  </div>
</nav>

<script>
const SUPABASE_URL = 'https://csdahuhrsxeumqmjsidw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_gWCvq372JoF8aoUQIcz-zw_eLV_NoDc';

let currentUser    = null;
let currentProfile = null;
let myTrips        = [];

async function getSession() {
  const stored = localStorage.getItem('sb_session');
  if (!stored) { window.location.href = 'login.html'; return null; }
  try { return JSON.parse(stored); } catch(e) { window.location.href = 'login.html'; return null; }
}

async function init() {
  const session = await getSession();
  if (!session) return;
  currentUser = session.user;

  // Load profile
  const pRes = await fetch(
    `${SUPABASE_URL}/rest/v1/profiles?id=eq.${currentUser.id}&select=*`,
    { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + session.access_token } }
  );
  const profiles = await pRes.json();
  currentProfile = profiles[0] || {};

  renderHeader();

  // Load my trips
  const tRes = await fetch(
    `${SUPABASE_URL}/rest/v1/trip_logs?user_id=eq.${currentUser.id}&select=*&order=trip_date.desc`,
    { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + session.access_token } }
  );
  myTrips = await tRes.json();

  renderStats();
  renderTopFlies();
  renderHatchChart();
  renderTripList();
}

function renderHeader() {
  const name = currentProfile.display_name || currentUser.email.split('@')[0];
  document.getElementById('profile-name').textContent = name;
  document.getElementById('avatar').textContent = name.charAt(0).toUpperCase();

  const subs = [];
  if (currentProfile.home_river) subs.push('🎣 ' + currentProfile.home_river);
  if (currentProfile.bio) subs.push(currentProfile.bio);
  document.getElementById('profile-sub').textContent = subs.join(' · ');
}

function renderStats() {
  const thisYear = new Date().getFullYear().toString();
  let totalFish = 0;
  let yearTrips = 0;
  const rivers = new Set();

  myTrips.forEach(t => {
    if (t.fish_counts) Object.values(t.fish_counts).forEach(v => totalFish += parseInt(v)||0);
    if (t.river) rivers.add(t.river);
    if (t.trip_date?.startsWith(thisYear)) yearTrips++;
  });

  document.getElementById('stat-trips').textContent  = myTrips.length || '—';
  document.getElementById('stat-fish').textContent   = totalFish || '—';
  document.getElementById('stat-rivers').textContent = rivers.size || '—';
  document.getElementById('stat-year').textContent   = yearTrips || '—';
}

function renderTopFlies() {
  const flyCounts = {};
  myTrips.forEach(t => {
    (t.flies_used || []).forEach(f => {
      if (f.pattern) flyCounts[f.pattern] = (flyCounts[f.pattern]||0) + (parseInt(f.caught)||1);
    });
  });
  const sorted = Object.entries(flyCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const max    = sorted[0]?.[1] || 1;
  const el     = document.getElementById('top-flies');

  if (!sorted.length) {
    el.innerHTML = `<div style="padding:16px 14px;font-size:13px;color:var(--stone)">No flies logged yet</div>`;
    return;
  }
  el.innerHTML = sorted.map(([name, count], i) => `
    <div class="fly-row">
      <span class="fly-rank">${i+1}</span>
      <span class="fly-name">${name}</span>
      <div class="fly-bar-wrap"><div class="fly-bar" style="width:${Math.round(count/max*100)}%"></div></div>
      <span class="fly-count">${count}</span>
    </div>`).join('');
}

function renderHatchChart() {
  const hatchCounts = {};
  myTrips.forEach(t => {
    (t.hatches || []).forEach(h => { hatchCounts[h] = (hatchCounts[h]||0) + 1; });
  });
  const sorted = Object.entries(hatchCounts).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const max    = sorted[0]?.[1] || 1;
  const el     = document.getElementById('hatch-chart');

  if (!sorted.length) {
    el.innerHTML = `<div style="font-size:13px;color:var(--stone)">No hatches logged yet</div>`;
    return;
  }
  el.innerHTML = sorted.map(([name, count]) => `
    <div class="hatch-item">
      <span class="hatch-name">${name}</span>
      <div class="hatch-bar-wrap"><div class="hatch-bar" style="width:${Math.round(count/max*100)}%"></div></div>
      <span class="hatch-num">${count}</span>
    </div>`).join('');
}

function renderTripList() {
  const el = document.getElementById('trip-list');
  document.getElementById('trip-count').textContent = `${myTrips.length} trip${myTrips.length!==1?'s':''}`;

  if (!myTrips.length) {
    el.innerHTML = `<div style="text-align:center;padding:30px 20px;color:var(--stone);background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius)"><p style="font-size:13px">No trips logged yet.<br>Head to the river and log your first trip!</p></div>`;
    return;
  }

  el.innerHTML = myTrips.map((t, i) => {
    let fishTotal = 0;
    if (t.fish_counts) Object.values(t.fish_counts).forEach(v => fishTotal += parseInt(v)||0);
    const dateObj = t.trip_date ? new Date(t.trip_date + 'T12:00:00') : null;
    const dateStr = dateObj ? dateObj.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) : '—';
    const stars   = [1,2,3,4,5].map(n=>`<span class="tstar${t.rating&&n<=t.rating?' lit':''}">★</span>`).join('');
    const topFly  = t.flies_used?.[0]?.pattern || null;
    const method  = t.fishing_method || null;
    const visIcon = t.visibility==='Public'?'🌍':t.visibility==='Private'?'🔒':'👥';

    return `
      <div class="trip-card" style="animation-delay:${i*0.04}s">
        <div>
          <div class="trip-river">${t.river || 'Unknown water'}</div>
          <div class="trip-meta">
            ${dateStr}${t.section?' · '+t.section:''}
            ${method?'<br>'+method:''}
            ${topFly?'<br>'+topFly:''}
          </div>
          <span class="vis-badge">${visIcon} ${t.visibility||'Public'}</span>
        </div>
        <div class="trip-right">
          <div class="trip-fish">${fishTotal||'—'}<small>fish</small></div>
          <div class="trip-rating">${stars}</div>
        </div>
      </div>`;
  }).join('');
}

// ── EDIT PROFILE ──
function openEdit() {
  document.getElementById('edit-name').value  = currentProfile.display_name || '';
  document.getElementById('edit-bio').value   = currentProfile.bio || '';
  document.getElementById('edit-river').value = currentProfile.home_river || '';
  document.getElementById('edit-overlay').classList.add('open');
}
function closeEditIfBg(e) {
  if (e.target === document.getElementById('edit-overlay'))
    document.getElementById('edit-overlay').classList.remove('open');
}

async function saveProfile() {
  const session = await getSession();
  if (!session) return;
  const btn = document.querySelector('.save-btn');
  btn.textContent = 'Saving…'; btn.disabled = true;

  const updates = {
    display_name: document.getElementById('edit-name').value.trim(),
    bio:          document.getElementById('edit-bio').value.trim(),
    home_river:   document.getElementById('edit-river').value.trim()
  };

  await fetch(
    `${SUPABASE_URL}/rest/v1/profiles?id=eq.${currentUser.id}`,
    {
      method: 'PATCH',
      headers: {
        'Content-Type':  'application/json',
        'apikey':        SUPABASE_KEY,
        'Authorization': 'Bearer ' + session.access_token,
        'Prefer':        'return=minimal'
      },
      body: JSON.stringify(updates)
    }
  );

  currentProfile = { ...currentProfile, ...updates };
  renderHeader();
  document.getElementById('edit-overlay').classList.remove('open');
  btn.textContent = 'Save profile'; btn.disabled = false;
}

// ── SIGN OUT ──
function signOut() {
  localStorage.removeItem('sb_session');
  window.location.href = 'login.html';
}

// ── PASSWORD RESET ──
function resetPassword() {
  document.getElementById('new-password').value     = '';
  document.getElementById('confirm-password').value = '';
  document.getElementById('password-error').style.display   = 'none';
  document.getElementById('password-success').style.display = 'none';
  document.getElementById('password-overlay').classList.add('open');
}

function closePasswordIfBg(e) {
  if (e.target === document.getElementById('password-overlay'))
    document.getElementById('password-overlay').classList.remove('open');
}

async function saveNewPassword() {
  const newPw  = document.getElementById('new-password').value;
  const confPw = document.getElementById('confirm-password').value;
  const errEl  = document.getElementById('password-error');
  const okEl   = document.getElementById('password-success');

  errEl.style.display = 'none';
  okEl.style.display  = 'none';

  if (newPw.length < 6) {
    errEl.textContent = 'Password must be at least 6 characters.';
    errEl.style.display = 'block'; return;
  }
  if (newPw !== confPw) {
    errEl.textContent = 'Passwords don\'t match — please try again.';
    errEl.style.display = 'block'; return;
  }

  const session = await getSession();
  if (!session) return;

  const btn = document.querySelector('#password-overlay .save-btn');
  btn.textContent = 'Updating…'; btn.disabled = true;

  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
      method: 'PUT',
      headers: {
        'Content-Type':  'application/json',
        'apikey':        SUPABASE_KEY,
        'Authorization': 'Bearer ' + session.access_token
      },
      body: JSON.stringify({ password: newPw })
    });

    if (!res.ok) {
      const data = await res.json();
      throw new Error(data.message || data.msg || 'Update failed');
    }

    okEl.textContent = '✓ Password updated successfully.';
    okEl.style.display = 'block';
    document.getElementById('new-password').value     = '';
    document.getElementById('confirm-password').value = '';
    setTimeout(() => {
      document.getElementById('password-overlay').classList.remove('open');
    }, 2000);

  } catch(e) {
    errEl.textContent = e.message;
    errEl.style.display = 'block';
  }

  btn.textContent = 'Update password'; btn.disabled = false;
}

async function sendResetEmail() {
  const session = await getSession();
  const email   = session?.user?.email;
  if (!email) return;

  try {
    await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ email })
    });
    const okEl = document.getElementById('password-success');
    okEl.textContent = `Reset link sent to ${email}`;
    okEl.style.display = 'block';
    document.getElementById('password-error').style.display = 'none';
  } catch(e) {
    const errEl = document.getElementById('password-error');
    errEl.textContent = 'Could not send reset email. Try again.';
    errEl.style.display = 'block';
  }
}

init();
</script>
