<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a2e1a">
<title>Catskill Fly — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --forest:    #1a2e1a;
    --moss:      #2e4a2a;
    --fern:      #3d6b36;
    --sage:      #6a9c5f;
    --mist:      #c8dfc4;
    --cream:     #f5f0e8;
    --water:     #2a4a5e;
    --amber:     #c9843a;
    --stone:     #7a7060;
    --parchment: #ede8dc;
    --ink:       #1e1c18;
    --border:    rgba(50,70,40,0.15);
    --font-serif: 'Playfair Display', Georgia, serif;
    --font-sans:  'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font-sans);
    background: var(--forest);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
    position: relative;
  }
  .logo-eye {
    font-size: 36px;
    margin-bottom: 8px;
  }
  .logo h1 {
    font-family: var(--font-serif);
    font-size: 28px;
    font-weight: 600;
    color: var(--cream);
    margin-bottom: 4px;
  }
  .logo p {
    font-size: 13px;
    color: var(--mist);
    opacity: 0.7;
  }

  .card {
    background: var(--cream);
    border-radius: 20px;
    padding: 28px 24px;
    width: 100%;
    max-width: 400px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  }

  .tab-row {
    display: flex;
    background: var(--parchment);
    border-radius: 10px;
    padding: 3px;
    margin-bottom: 24px;
  }
  .tab {
    flex: 1;
    padding: 8px;
    text-align: center;
    font-size: 14px;
    font-weight: 500;
    color: var(--stone);
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
  }
  .tab.active {
    background: var(--forest);
    color: var(--cream);
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: var(--stone);
    text-transform: uppercase;
    margin-bottom: 6px;
    margin-top: 14px;
  }
  label:first-of-type { margin-top: 0; }

  input {
    width: 100%;
    font-family: var(--font-sans);
    font-size: 15px;
    color: var(--ink);
    background: var(--parchment);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  input:focus {
    border-color: var(--fern);
    box-shadow: 0 0 0 3px rgba(61,107,54,0.12);
    background: white;
  }

  .submit-btn {
    width: 100%;
    padding: 14px;
    background: var(--forest);
    color: var(--cream);
    font-family: var(--font-serif);
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    margin-top: 20px;
    transition: background 0.2s, transform 0.1s;
    box-shadow: 0 4px 16px rgba(26,46,26,0.3);
  }
  .submit-btn:active { transform: scale(0.98); background: var(--moss); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .divider {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 18px 0;
    color: var(--stone);
    font-size: 12px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .error-msg {
    background: #fdf0f0;
    border: 1px solid rgba(180,60,60,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #b44040;
    margin-top: 12px;
    display: none;
  }
  .success-msg {
    background: #e8f4e5;
    border: 1px solid rgba(61,107,54,0.2);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--fern);
    margin-top: 12px;
    display: none;
  }

  .forgot-link {
    text-align: center;
    margin-top: 14px;
    font-size: 13px;
    color: var(--stone);
    cursor: pointer;
    text-decoration: underline;
  }

  .footer-note {
    text-align: center;
    margin-top: 20px;
    font-size: 12px;
    color: var(--mist);
    opacity: 0.6;
    position: relative;
  }
</style>
</head>
<body>

<div class="logo">
  <div class="logo-eye">🎣</div>
  <h1>Catskill Fly</h1>
  <p>Your fishing journal, shared with the community</p>
</div>

<div class="card">
  <div class="tab-row">
    <div class="tab active" id="tab-signin" onclick="showTab('signin')">Sign in</div>
    <div class="tab" id="tab-signup" onclick="showTab('signup')">Create account</div>
  </div>

  <!-- SIGN IN -->
  <div id="form-signin">
    <label>Email</label>
    <input type="email" id="signin-email" placeholder="your@email.com" autocomplete="email">
    <label>Password</label>
    <input type="password" id="signin-password" placeholder="••••••••" autocomplete="current-password">
    <button class="submit-btn" id="signin-btn" onclick="signIn()">Sign in</button>
    <div class="forgot-link" onclick="showForgot()">Forgot password?</div>
  </div>

  <!-- SIGN UP -->
  <div id="form-signup" style="display:none">
    <label>Display name</label>
    <input type="text" id="signup-name" placeholder="e.g. John Angler" autocomplete="name">
    <label>Email</label>
    <input type="email" id="signup-email" placeholder="your@email.com" autocomplete="email">
    <label>Password</label>
    <input type="password" id="signup-password" placeholder="At least 6 characters" autocomplete="new-password">
    <button class="submit-btn" id="signup-btn" onclick="signUp()">Create account</button>
  </div>

  <!-- FORGOT PASSWORD -->
  <div id="form-forgot" style="display:none">
    <p style="font-size:13px;color:var(--stone);margin-bottom:14px;line-height:1.5">
      Enter your email and we'll send you a link to reset your password.
    </p>
    <label>Email</label>
    <input type="email" id="forgot-email" placeholder="your@email.com">
    <button class="submit-btn" onclick="sendReset()">Send reset link</button>
    <div class="forgot-link" onclick="showTab('signin')">Back to sign in</div>
  </div>

  <div class="error-msg"   id="error-msg"></div>
  <div class="success-msg" id="success-msg"></div>
</div>

<div class="footer-note">
  Your data is private by default.<br>Only you see your private trips.
</div>

<script>
const SUPABASE_URL = 'https://csdahuhrsxeumqmjsidw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_gWCvq372JoF8aoUQIcz-zw_eLV_NoDc';

// If already logged in, redirect to feed
async function checkSession() {
  const stored = localStorage.getItem('sb_session');
  if (stored) {
    try {
      const session = JSON.parse(stored);
      if (session?.access_token) {
        // Verify token is still valid
        const res = await fetch(`${SUPABASE_URL}/auth/v1/user`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': 'Bearer ' + session.access_token
          }
        });
        if (res.ok) { window.location.href = 'index.html'; return; }
      }
    } catch(e) {}
    localStorage.removeItem('sb_session');
  }
}
checkSession();

function showTab(tab) {
  document.getElementById('form-signin').style.display  = tab === 'signin'  ? 'block' : 'none';
  document.getElementById('form-signup').style.display  = tab === 'signup'  ? 'block' : 'none';
  document.getElementById('form-forgot').style.display  = tab === 'forgot'  ? 'block' : 'none';
  document.getElementById('tab-signin').classList.toggle('active', tab === 'signin');
  document.getElementById('tab-signup').classList.toggle('active', tab === 'signup');
  hideMessages();
}

function showForgot() {
  document.getElementById('form-signin').style.display = 'none';
  document.getElementById('form-forgot').style.display = 'block';
  document.getElementById('tab-signin').classList.remove('active');
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('success-msg').style.display = 'none';
}
function showSuccess(msg) {
  const el = document.getElementById('success-msg');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('error-msg').style.display = 'none';
}
function hideMessages() {
  document.getElementById('error-msg').style.display   = 'none';
  document.getElementById('success-msg').style.display = 'none';
}

async function signIn() {
  const email    = document.getElementById('signin-email').value.trim();
  const password = document.getElementById('signin-password').value;
  if (!email || !password) { showError('Please enter your email and password.'); return; }

  const btn = document.getElementById('signin-btn');
  btn.textContent = 'Signing in…'; btn.disabled = true;

  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || 'Sign in failed');
    localStorage.setItem('sb_session', JSON.stringify(data));
    window.location.href = 'index.html';
  } catch(e) {
    showError(e.message);
    btn.textContent = 'Sign in'; btn.disabled = false;
  }
}

async function signUp() {
  const name     = document.getElementById('signup-name').value.trim();
  const email    = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  if (!name)     { showError('Please enter a display name.'); return; }
  if (!email)    { showError('Please enter your email.'); return; }
  if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

  const btn = document.getElementById('signup-btn');
  btn.textContent = 'Creating account…'; btn.disabled = true;

  try {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ email, password, data: { display_name: name } })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error_description || data.msg || 'Sign up failed');

    if (data.access_token) {
      // Auto-confirmed — save session and redirect
      localStorage.setItem('sb_session', JSON.stringify(data));
      window.location.href = 'index.html';
    } else {
      showSuccess('Account created! Check your email to confirm, then sign in.');
      btn.textContent = 'Create account'; btn.disabled = false;
    }
  } catch(e) {
    showError(e.message);
    btn.textContent = 'Create account'; btn.disabled = false;
  }
}

async function sendReset() {
  const email = document.getElementById('forgot-email').value.trim();
  if (!email) { showError('Please enter your email.'); return; }
  try {
    await fetch(`${SUPABASE_URL}/auth/v1/recover`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
      body: JSON.stringify({ email })
    });
    showSuccess('Reset link sent — check your email.');
  } catch(e) {
    showError('Could not send reset link. Try again.');
  }
}

// Allow Enter key to submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const signin = document.getElementById('form-signin');
    const signup = document.getElementById('form-signup');
    if (signin.style.display !== 'none') signIn();
    else if (signup.style.display !== 'none') signUp();
  }
});
</script>
</body>
</html>
