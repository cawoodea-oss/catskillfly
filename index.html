<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="apple-touch-icon" href="favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a2e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-title" content="CatskillFly">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Catskill Fly — Recent Reports</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --forest:    #1a2e1a;
    --moss:      #2e4a2a;
    --fern:      #3d6b36;
    --sage:      #6a9c5f;
    --mist:      #c8dfc4;
    --cream:     #f5f0e8;
    --water:     #2a4a5e;
    --current:   #3d7a9c;
    --amber:     #c9843a;
    --stone:     #7a7060;
    --parchment: #ede8dc;
    --ink:       #1e1c18;
    --card-bg:   #ffffff;
    --border:    rgba(50,70,40,0.15);
    --shadow:    0 2px 16px rgba(26,46,26,0.08);
    --radius:    14px;
    --font-serif: 'Playfair Display', Georgia, serif;
    --font-sans:  'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font-sans);
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 90px;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(160deg, var(--forest) 0%, var(--moss) 60%, var(--water) 100%);
    padding: 52px 20px 32px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 28px;
    background: var(--cream);
    clip-path: ellipse(55% 100% at 50% 100%);
  }
  .header-inner {
    position: relative;
    max-width: 600px;
    margin: 0 auto;
  }
  .header-eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 6px;
  }
  .header h1 {
    font-family: var(--font-serif);
    font-size: clamp(24px, 6vw, 34px);
    font-weight: 600;
    color: var(--cream);
    line-height: 1.15;
    margin-bottom: 16px;
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-pill {
    display: flex;
    align-items: center;
    gap: 5px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--mist);
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
    backdrop-filter: blur(4px);
  }
  .filter-pill.active {
    background: rgba(255,255,255,0.22);
    border-color: rgba(255,255,255,0.4);
    color: #fff;
  }
  .filter-pill:active { background: rgba(255,255,255,0.28); }

  /* ── PAGE BODY ── */
  .page-body {
    max-width: 600px;
    margin: 0 auto;
    padding: 20px 14px;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }
  .stat-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-num {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 600;
    color: var(--forest);
    line-height: 1;
    margin-bottom: 3px;
  }
  .stat-label {
    font-size: 11px;
    color: var(--stone);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ── SECTION HEADING ── */
  .section-heading {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .section-heading h2 {
    font-family: var(--font-serif);
    font-size: 17px;
    font-weight: 600;
    color: var(--forest);
  }
  .section-heading span {
    font-size: 12px;
    color: var(--stone);
  }

  /* ── LOGBOOK TABLE ── */
  .logbook {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 16px;
  }

  /* Column header */
  .log-header {
    display: grid;
    grid-template-columns: 90px 1fr 54px 54px 54px;
    gap: 0;
    padding: 8px 14px;
    background: var(--parchment);
    border-bottom: 1px solid var(--border);
  }
  .log-header span {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--stone);
  }
  .log-header span:not(:first-child) { text-align: center; }

  /* Each row */
  .log-row {
    display: grid;
    grid-template-columns: 90px 1fr 54px 54px 54px;
    gap: 0;
    padding: 11px 14px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
    animation: fadeIn 0.3s ease both;
    align-items: center;
  }
  .log-row:last-child { border-bottom: none; }
  .log-row:active { background: var(--parchment); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .log-date {
    font-size: 12px;
    color: var(--stone);
    line-height: 1.4;
  }
  .log-date strong {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink);
  }

  .log-river {
    padding: 0 8px;
  }
  .log-river strong {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--forest);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .log-river span {
    font-size: 11px;
    color: var(--stone);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: block;
  }

  .log-cell {
    text-align: center;
    font-size: 13px;
    color: var(--ink);
  }
  .log-cell small {
    display: block;
    font-size: 10px;
    color: var(--stone);
    margin-top: 1px;
  }

  .rating-dots {
    display: flex;
    justify-content: center;
    gap: 2px;
  }
  .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #ddd;
  }
  .dot.lit { background: var(--amber); }

  /* Fly tags */
  .fly-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 4px;
  }
  .fly-tag {
    font-size: 10px;
    background: var(--parchment);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2px 7px;
    color: var(--stone);
  }

  /* ── EXPANDED ROW DETAIL ── */
  .log-detail {
    display: none;
    background: var(--parchment);
    border-bottom: 1px solid var(--border);
    padding: 12px 14px;
    animation: fadeIn 0.2s ease;
  }
  .log-detail.open { display: block; }
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .detail-item label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--stone);
    display: block;
    margin-bottom: 2px;
  }
  .detail-item p {
    font-size: 13px;
    color: var(--ink);
    line-height: 1.4;
  }
  .detail-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 8px;
  }
  .detail-chip {
    font-size: 11px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 3px 9px;
    color: var(--ink);
  }
  .detail-chip.hatch { background: #fff8f0; border-color: rgba(201,132,58,0.25); color: var(--amber); }
  .detail-notes {
    margin-top: 10px;
    font-size: 13px;
    color: var(--stone);
    font-style: italic;
    line-height: 1.5;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }

  /* ── FULL REPORT SHEET ── */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .sheet-overlay.open {
    opacity: 1;
    pointer-events: all;
  }
  .report-sheet {
    background: var(--cream);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-height: 92vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    padding-bottom: 40px;
  }
  .sheet-overlay.open .report-sheet {
    transform: translateY(0);
  }

  /* Sheet drag handle */
  .sheet-handle {
    display: flex;
    justify-content: center;
    padding: 12px 0 6px;
  }
  .sheet-handle div {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
  }

  /* Sheet header */
  .sheet-header {
    padding: 4px 18px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .sheet-river {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 600;
    color: var(--forest);
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .sheet-sub {
    font-size: 13px;
    color: var(--stone);
    line-height: 1.5;
  }
  .sheet-close {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: var(--parchment);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    font-size: 16px;
    color: var(--stone);
    margin-top: 2px;
  }

  /* Sheet photos */
  .sheet-photos {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 14px 18px;
    scrollbar-width: none;
  }
  .sheet-photos::-webkit-scrollbar { display: none; }
  .sheet-photo {
    flex-shrink: 0;
    width: 200px; height: 150px;
    border-radius: 10px;
    object-fit: cover;
    border: 1px solid var(--border);
  }

  /* Sheet sections */
  .sheet-section {
    background: var(--card-bg);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    margin: 10px 14px 0;
    overflow: hidden;
  }
  .sheet-section-title {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--parchment);
  }
  .sheet-section-title span {
    font-family: var(--font-serif);
    font-size: 14px;
    font-weight: 600;
    color: var(--forest);
  }
  .sheet-section-icon {
    width: 24px; height: 24px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* Grid of data pairs */
  .data-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .data-cell {
    padding: 11px 14px;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .data-cell:nth-child(even) { border-right: none; }
  .data-cell:nth-last-child(-n+2) { border-bottom: none; }
  .data-cell label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--stone);
    display: block;
    margin-bottom: 3px;
  }
  .data-cell p {
    font-size: 14px;
    color: var(--ink);
    font-weight: 500;
  }

  /* Chip rows inside sheet */
  .sheet-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 12px 14px;
  }
  .sheet-chip {
    font-size: 12px;
    background: var(--parchment);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px 10px;
    color: var(--ink);
  }
  .sheet-chip.hatch {
    background: #fff8f0;
    border-color: rgba(201,132,58,0.25);
    color: var(--amber);
  }
  .sheet-chip.fly {
    background: #e8f4e5;
    border-color: rgba(61,107,54,0.2);
    color: var(--fern);
  }

  /* Fly table */
  .fly-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .fly-table th {
    text-align: left;
    padding: 8px 14px;
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--stone);
    border-bottom: 1px solid var(--border);
    background: var(--parchment);
  }
  .fly-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    color: var(--ink);
  }
  .fly-table tr:last-child td { border-bottom: none; }
  .fly-table td:not(:first-child) { text-align: center; color: var(--stone); }

  /* Notes block */
  .sheet-notes {
    padding: 14px;
    font-size: 14px;
    color: var(--ink);
    line-height: 1.65;
    font-style: italic;
  }

  /* Rating stars */
  .sheet-stars {
    padding: 10px 14px;
    display: flex;
    gap: 4px;
    align-items: center;
  }
  .sheet-star { font-size: 20px; color: #ddd; }
  .sheet-star.lit { color: var(--amber); }

  /* Privacy badge */
  .privacy-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 10px;
    background: var(--parchment);
    border: 1px solid var(--border);
    color: var(--stone);
    margin-top: 4px;
  }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align: center;
    padding: 48px 20px;
    color: var(--stone);
  }
  .empty-state svg { opacity: 0.25; margin-bottom: 14px; }
  .empty-state h3 {
    font-family: var(--font-serif);
    font-size: 18px;
    color: var(--forest);
    margin-bottom: 6px;
  }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  /* ── LOADING ── */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px;
    gap: 12px;
    color: var(--stone);
    font-size: 13px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--fern);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── LOAD MORE ── */
  .load-more {
    width: 100%;
    padding: 13px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: var(--font-sans);
    font-size: 14px;
    color: var(--fern);
    cursor: pointer;
    transition: background 0.2s;
    margin-top: 4px;
  }
  .load-more:active { background: rgba(61,107,54,0.07); }

  /* ── NAV BAR ── */
  .nav-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card-bg);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 10px 0 max(10px, env(safe-area-inset-bottom));
    z-index: 100;
    box-shadow: 0 -4px 20px rgba(26,46,26,0.08);
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 500;
    color: var(--stone);
    text-decoration: none;
    cursor: pointer;
    transition: color 0.15s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .nav-item.active { color: var(--fern); }
  .nav-item svg { transition: transform 0.15s; }
  .nav-item.active svg { transform: scale(1.1); }
  .nav-log {
    width: 44px; height: 44px;
    background: var(--forest);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-top: -20px;
    box-shadow: 0 4px 14px rgba(26,46,26,0.35);
    border: 3px solid var(--cream);
  }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative;
    margin-bottom: 14px;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--stone);
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 10px 14px 10px 36px;
    font-family: var(--font-sans);
    font-size: 14px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    outline: none;
    color: var(--ink);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input:focus {
    border-color: var(--fern);
    box-shadow: 0 0 0 3px rgba(61,107,54,0.10);
  }
  .search-input::placeholder { color: var(--stone); }
</style>
<script src="auth.js"></script>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-inner">
    <div class="header-eyebrow">Catskill Fly</div>
    <h1>Recent Reports</h1>
    <div class="filter-bar">
      <div class="filter-pill active" onclick="setFilter('all', this)">All waters</div>
      <div class="filter-pill" onclick="setFilter('today', this)">Today</div>
      <div class="filter-pill" onclick="setFilter('week', this)">This week</div>
      <div class="filter-pill" onclick="setFilter('dry', this)">Dry fly</div>
      <div class="filter-pill" onclick="setFilter('nymph', this)">Nymph</div>
      <div class="filter-pill" onclick="setFilter('streamer', this)">Streamer</div>
    </div>
  </div>
</div>

<!-- PAGE -->
<div class="page-body">

  <!-- STATS -->
  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-num" id="stat-trips">—</div>
      <div class="stat-label">Trips logged</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-fish">—</div>
      <div class="stat-label">Fish reported</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-rivers">—</div>
      <div class="stat-label">Waters fished</div>
    </div>
  </div>

  <!-- SEARCH -->
  <div class="search-wrap">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input class="search-input" type="text" placeholder="Search river, fly, hatch…" oninput="searchLogs(this.value)">
  </div>

  <!-- LOGBOOK -->
  <div class="section-heading">
    <h2>Trip log</h2>
    <span id="row-count">Loading…</span>
  </div>

  <div class="logbook" id="logbook">
    <div class="loading">
      <div class="spinner"></div>
      Reading the water…
    </div>
  </div>

  <button class="load-more" id="load-more" style="display:none" onclick="loadMore()">
    Load more reports ↓
  </button>

</div>

<!-- FULL REPORT SHEET -->
<div class="sheet-overlay" id="report-overlay" onclick="closeReportIfBackground(event)">
  <div class="report-sheet" id="report-sheet">
    <div class="sheet-handle"><div></div></div>
    <div id="report-content"></div>
  </div>
</div>

<!-- NAV BAR -->
<nav class="nav-bar">
  <a class="nav-item active" href="index.html" style="text-decoration:none">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Feed
  </a>
  <a class="nav-item" href="discover.html" style="text-decoration:none">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    Discover
  </a>
  <a class="nav-item" href="fishing-log.html" style="text-decoration:none">
    <div class="nav-log">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </div>
    Log
  </a>
  <a class="nav-item" href="community.html" style="text-decoration:none">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Community
  </a>
  <a class="nav-item" href="profile.html" style="text-decoration:none">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    Profile
  </a>
</nav>

<script>
// SUPABASE_URL and SUPABASE_KEY defined in auth.js
const PAGE_SIZE = 20;

let currentSession = null;
let allLogs     = [];
let filtered    = [];
let displayed   = 0;
let activeFilter = 'all';
let searchTerm   = '';

// ── Inline auth helpers (avoids auth.js timing issues) ──
function getSession() {
  try { return JSON.parse(localStorage.getItem('sb_session')); } catch(e) { return null; }
}

async function getValidSession() {
  let session = getSession();
  if (!session?.access_token) return null;
  // Check if token expires within 5 min
  if (session.expires_at && Date.now() > (session.expires_at * 1000) - 5 * 60 * 1000) {
    try {
      const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_KEY },
        body: JSON.stringify({ refresh_token: session.refresh_token })
      });
      if (res.ok) {
        session = await res.json();
        localStorage.setItem('sb_session', JSON.stringify(session));
      }
    } catch(e) { console.warn('Token refresh failed:', e); }
  }
  return session;
}

// ── INIT ──
async function init() {
  currentSession = await getValidSession();
  if (!currentSession?.access_token) {
    window.location.href = 'login.html';
    return;
  }
  fetchLogs();
}

// ── FETCH ──
async function fetchLogs() {
  try {
    const token = currentSession?.access_token || SUPABASE_KEY;
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/trip_logs?select=*&order=trip_date.desc,created_at.desc&limit=200`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + token } }
    );
    if (!res.ok) throw new Error(await res.text());
    allLogs = await res.json();
    applyFilters();
    updateStats();
  } catch (err) {
    document.getElementById('logbook').innerHTML =
      `<div class="empty-state"><p>Could not load reports.<br>Check your connection and try again.</p></div>`;
    console.error(err);
  }
}

// ── STATS ──
function updateStats() {
  document.getElementById('stat-trips').textContent = allLogs.length;

  let totalFish = 0;
  allLogs.forEach(log => {
    if (log.fish_counts) {
      Object.values(log.fish_counts).forEach(v => totalFish += parseInt(v) || 0);
    }
  });
  document.getElementById('stat-fish').textContent = totalFish || '—';

  const rivers = new Set(allLogs.map(l => l.river).filter(Boolean));
  document.getElementById('stat-rivers').textContent = rivers.size || '—';
}

// ── FILTERS ──
function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function searchLogs(val) {
  searchTerm = val.toLowerCase();
  applyFilters();
}

function applyFilters() {
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  const weekAgo  = new Date(now - 7 * 86400000).toISOString().split('T')[0];

  filtered = allLogs.filter(log => {
    // date / method filters
    if (activeFilter === 'today'   && log.trip_date !== todayStr) return false;
    if (activeFilter === 'week'    && log.trip_date < weekAgo)    return false;
    if (activeFilter === 'dry'     && log.fishing_method !== 'Dry fly')  return false;
    if (activeFilter === 'nymph'   && log.fishing_method !== 'Nymph')    return false;
    if (activeFilter === 'streamer'&& log.fishing_method !== 'Streamer') return false;

    // search
    if (searchTerm) {
      const hay = [
        log.river, log.section, log.fishing_method,
        log.hatch_notes, log.trip_notes,
        ...(log.hatches || []),
        ...(log.flies_used ? log.flies_used.map(f => f.pattern) : [])
      ].join(' ').toLowerCase();
      if (!hay.includes(searchTerm)) return false;
    }
    return true;
  });

  displayed = 0;
  renderLogs(false);
}

// ── RENDER ──
function renderLogs(append) {
  const logbook = document.getElementById('logbook');
  const batch   = filtered.slice(displayed, displayed + PAGE_SIZE);
  displayed += batch.length;

  document.getElementById('row-count').textContent =
    `${filtered.length} report${filtered.length !== 1 ? 's' : ''}`;

  if (!append) {
    if (filtered.length === 0) {
      logbook.innerHTML = `
        <div class="empty-state">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
          <h3>No reports yet</h3>
          <p>Be the first to log a trip<br>and share what's happening on the water.</p>
        </div>`;
      document.getElementById('load-more').style.display = 'none';
      return;
    }
    logbook.innerHTML = `
      <div class="log-header">
        <span>Date</span>
        <span style="text-align:left;padding-left:8px">River</span>
        <span>Fish</span>
        <span>Temp</span>
        <span>Rating</span>
      </div>`;
  }

  batch.forEach((log, i) => {
    const id = 'row-' + log.id;

    // Date
    const dateObj = log.trip_date ? new Date(log.trip_date + 'T12:00:00') : null;
    const dateStr = dateObj ? dateObj.toLocaleDateString('en-US', { month:'short', day:'numeric' }) : '—';
    const yearStr = dateObj ? dateObj.getFullYear() : '';

    // Fish total
    let fishTotal = 0;
    if (log.fish_counts) Object.values(log.fish_counts).forEach(v => fishTotal += parseInt(v)||0);

    // Water temp
    const temp = log.water_temp ? `${log.water_temp}°${log.temp_unit||'F'}` : '—';

    // Rating dots
    const dots = [1,2,3,4,5].map(n =>
      `<div class="dot${log.rating && n <= log.rating ? ' lit' : ''}"></div>`
    ).join('');

    // Top flies
    const flies = (log.flies_used || []).slice(0,2).map(f =>
      `<span class="fly-tag">${f.pattern || '—'}</span>`
    ).join('');

    // Hatches
    const hatches = (log.hatches || []).map(h =>
      `<span class="detail-chip hatch">${h}</span>`
    ).join('');

    // Conditions chips
    const condChips = [log.sky?.[0], log.water_clarity, log.wind]
      .filter(Boolean)
      .map(c => `<span class="detail-chip">${c}</span>`).join('');

    // Fish species breakdown
    const speciesBreakdown = log.fish_counts
      ? Object.entries(log.fish_counts).map(([sp, ct]) => `${ct} ${sp}`).join(' · ')
      : null;

    const row = document.createElement('div');
    row.style.animationDelay = (i * 0.04) + 's';

    row.innerHTML = `
      <div class="log-row" onclick="openReport('${log.id}')">
        <div class="log-date">
          <strong>${dateStr}</strong>
          ${yearStr}
        </div>
        <div class="log-river">
          <strong>${log.river || 'Unknown water'}</strong>
          <span>${log.section || log.fishing_method || ''}</span>
          ${flies ? `<div class="fly-tags">${flies}</div>` : ''}
        </div>
        <div class="log-cell">${fishTotal || '—'}<small>fish</small></div>
        <div class="log-cell">${temp}</div>
        <div class="log-cell"><div class="rating-dots">${dots}</div></div>
      </div>`;

    logbook.appendChild(row);
  });

  document.getElementById('load-more').style.display =
    displayed < filtered.length ? 'block' : 'none';
}

function loadMore() { renderLogs(true); }

function openReport(id) {
  const log = allLogs.find(l => l.id === id);
  if (!log) return;

  // Respect privacy — only show full detail for public reports
  // (friends only and private still show in feed but with limited detail)
  const isPrivate = log.visibility === 'Private';

  const dateObj = log.trip_date ? new Date(log.trip_date + 'T12:00:00') : null;
  const dateStr = dateObj ? dateObj.toLocaleDateString('en-US', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  }) : '—';

  let fishTotal = 0;
  if (log.fish_counts) Object.values(log.fish_counts).forEach(v => fishTotal += parseInt(v)||0);

  const speciesRows = log.fish_counts
    ? Object.entries(log.fish_counts).map(([sp, ct]) => {
        const sizes = log.fish_sizes?.[sp] || [];
        // Build sub-rows for individual fish measurements
        const fishRows = sizes.map((f, i) => {
          if (!f || (f.length == null && f.weight == null)) return '';
          const parts = [];
          if (f.length != null) parts.push(`${f.length}"`);
          if (f.weight != null) parts.push(`${f.weight} lb`);
          return parts.length
            ? `<div style="font-size:11px;color:var(--stone,#888);padding-left:4px;line-height:1.8">
                 #${i+1} — ${parts.join(' · ')}
               </div>`
            : '';
        }).join('');
        return `<tr>
          <td style="vertical-align:top">
            ${sp}
            ${fishRows ? `<div style="margin-top:2px">${fishRows}</div>` : ''}
          </td>
          <td style="vertical-align:top">${ct}</td>
        </tr>`;
      }).join('')
    : '';

  const flyRows = (log.flies_used || []).map(f =>
    `<tr>
      <td>${f.pattern || '—'}</td>
      <td>${f.size || '—'}</td>
      <td>${f.caught || '0'}</td>
      <td>${f.notes || ''}</td>
    </tr>`).join('');

  const stars = [1,2,3,4,5].map(n =>
    `<span class="sheet-star${log.rating && n <= log.rating ? ' lit' : ''}">★</span>`
  ).join('');

  const hatchChips = (log.hatches || []).map(h =>
    `<span class="sheet-chip hatch">${h}</span>`).join('');

  const skyChips = (log.sky || []).map(s =>
    `<span class="sheet-chip">${s}</span>`).join('');

  const photos = (log.photo_urls || []).map(url =>
    `<img class="sheet-photo" src="${url}" alt="Trip photo">`).join('');

  const privacyIcon = log.visibility === 'Public' ? '🌍'
    : log.visibility === 'Private' ? '🔒' : '👥';

  document.getElementById('report-content').innerHTML = `
    <div class="sheet-header">
      <div>
        <div class="sheet-river">${log.river || 'Unknown water'}</div>
        <div class="sheet-sub">
          ${log.section ? log.section + ' · ' : ''}${dateStr}
        </div>
        <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center">
          ${log.fishing_method ? `<span class="sheet-chip" style="margin:0">${log.fishing_method}</span>` : ''}
          <span class="privacy-badge">${privacyIcon} ${log.visibility || 'Friends only'}</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0">
        ${log.user_id === currentSession?.user?.id ? `
        <button onclick="editLog('${log.id}')" style="
          background:var(--fern,#4a7c59);color:#fff;border:none;border-radius:8px;
          padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap">
          ✏️ Edit
        </button>` : ''}
        <div class="sheet-close" onclick="closeReport()">✕</div>
      </div>
    </div>

    ${photos ? `<div class="sheet-photos">${photos}</div>` : ''}

    ${isPrivate ? `
      <div style="padding:20px 18px;text-align:center;color:var(--stone);font-size:13px">
        🔒 This report is private
      </div>` : `

    <!-- Conditions -->
    <div class="sheet-section">
      <div class="sheet-section-title">
        <div class="sheet-section-icon" style="background:#e3eef7">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3d7a9c" stroke-width="2"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9z"/></svg>
        </div>
        <span>Conditions</span>
      </div>
      <div class="data-grid">
        <div class="data-cell"><label>Water temp</label><p>${log.water_temp ? log.water_temp + '°' + (log.temp_unit||'F') : '—'}</p></div>
        <div class="data-cell"><label>Air temp</label><p>${log.air_temp ? log.air_temp + '°' + (log.temp_unit||'F') : '—'}</p></div>
        <div class="data-cell"><label>Flow</label><p>${log.flow_cfs ? Math.round(log.flow_cfs) + ' cfs' : '—'}</p></div>
        <div class="data-cell"><label>Barometer</label><p>${log.barometric_pressure || '—'}</p></div>
        <div class="data-cell"><label>Water clarity</label><p>${log.water_clarity || '—'}</p></div>
        <div class="data-cell"><label>Wind</label><p>${log.wind || '—'}</p></div>
        ${log.start_time ? `<div class="data-cell"><label>On water</label><p>${formatTime(log.start_time)}${log.end_time ? ' – ' + formatTime(log.end_time) : ''}</p></div>` : ''}
      </div>
      ${skyChips ? `<div class="sheet-chips">${skyChips}</div>` : ''}
    </div>

    <!-- Hatches -->
    ${log.hatches?.length ? `
    <div class="sheet-section">
      <div class="sheet-section-title">
        <div class="sheet-section-icon" style="background:#f7ede0">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#c9843a" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        </div>
        <span>Hatches</span>
      </div>
      <div class="sheet-chips">${hatchChips}</div>
      ${log.hatch_intensity || log.hatch_timing ? `
      <div class="data-grid">
        ${log.hatch_intensity ? `<div class="data-cell"><label>Intensity</label><p>${log.hatch_intensity}</p></div>` : ''}
        ${log.hatch_timing   ? `<div class="data-cell"><label>Timing</label><p>${log.hatch_timing}</p></div>` : ''}
      </div>` : ''}
      ${log.hatch_notes ? `<div class="sheet-notes">"${log.hatch_notes}"</div>` : ''}
    </div>` : ''}

    <!-- Fly Setup -->
    ${log.fly_line || flyRows ? `
    <div class="sheet-section">
      <div class="sheet-section-title">
        <div class="sheet-section-icon" style="background:#e0f0ee">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2a7a72" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l2 2 4-4"/></svg>
        </div>
        <span>Fly setup</span>
      </div>
      ${log.fly_line || log.line_weight || log.tippet_size ? `
      <div class="data-grid">
        ${log.fly_line      ? `<div class="data-cell"><label>Line</label><p>${log.fly_line}</p></div>` : ''}
        ${log.line_weight   ? `<div class="data-cell"><label>Weight</label><p>${log.line_weight}</p></div>` : ''}
        ${log.leader_length ? `<div class="data-cell"><label>Leader</label><p>${log.leader_length}</p></div>` : ''}
        ${log.tippet_size   ? `<div class="data-cell"><label>Tippet</label><p>${log.tippet_size} ${log.tippet_material || ''}</p></div>` : ''}
      </div>` : ''}
      ${flyRows ? `
      <table class="fly-table">
        <thead><tr><th>Pattern</th><th>Size</th><th>Caught</th><th>Notes</th></tr></thead>
        <tbody>${flyRows}</tbody>
      </table>` : ''}
    </div>` : ''}

    <!-- Catch -->
    ${fishTotal > 0 || speciesRows ? `
    <div class="sheet-section">
      <div class="sheet-section-title">
        <div class="sheet-section-icon" style="background:#e8f4e5">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3d6b36" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg>
        </div>
        <span>Catch — ${fishTotal} fish to hand</span>
      </div>
      ${speciesRows ? `
      <table class="fly-table">
        <thead><tr><th>Species</th><th>Count</th></tr></thead>
        <tbody>${speciesRows}</tbody>

      </table>` : ''}
      ${log.biggest_fish_length ? `
      <div class="data-grid">
        <div class="data-cell"><label>Biggest fish</label><p>${log.biggest_fish_length}"${log.biggest_fish_weight ? ' · ' + log.biggest_fish_weight + ' lb' : ''}</p></div>
        ${log.fishing_method ? `<div class="data-cell"><label>Method</label><p>${log.fishing_method}</p></div>` : ''}
      </div>` : ''}
    </div>` : ''}

    <!-- Notes & Rating -->
    ${log.trip_notes || log.rating ? `
    <div class="sheet-section">
      <div class="sheet-section-title">
        <div class="sheet-section-icon" style="background:#ede8f5">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6a4da0" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
        <span>Notes</span>
      </div>
      ${log.rating ? `<div class="sheet-stars">${stars}<span style="font-size:12px;color:var(--stone);margin-left:6px">${log.rating}/5</span></div>` : ''}
      ${log.trip_notes ? `<div class="sheet-notes">"${log.trip_notes}"</div>` : ''}
    </div>` : ''}

    `}`;

  document.getElementById('report-overlay').classList.add('open');
  document.getElementById('report-sheet').scrollTop = 0;
}

function closeReport() {
  document.getElementById('report-overlay').classList.remove('open');
}

function editLog(id) {
  window.location.href = `fishing-log.html?edit=${id}`;
}

function closeReportIfBackground(e) {
  if (e.target === document.getElementById('report-overlay')) closeReport();
}

function formatTime(t) {
  if (!t) return '';
  const [h, m] = t.split(':');
  const hr = parseInt(h);
  return `${hr % 12 || 12}:${m}${hr < 12 ? 'am' : 'pm'}`;
}

// ── INIT ──
// Synchronous check first — redirect immediately if no session
if (!getSession()?.access_token) {
  window.location.href = 'login.html';
} else {
  init();
}
</script>

</body>
</html>
