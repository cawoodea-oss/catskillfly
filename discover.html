<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#1a2e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-title" content="CatskillFly">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Catskill Fly — Discover</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
  :root {
    --forest:    #1a2e1a;
    --moss:      #2e4a2a;
    --fern:      #3d6b36;
    --sage:      #6a9c5f;
    --mist:      #c8dfc4;
    --cream:     #f5f0e8;
    --water:     #2a4a5e;
    --current:   #3d7a9c;
    --amber:     #c9843a;
    --stone:     #7a7060;
    --parchment: #ede8dc;
    --ink:       #1e1c18;
    --card-bg:   #ffffff;
    --border:    rgba(50,70,40,0.15);
    --shadow:    0 2px 16px rgba(26,46,26,0.08);
    --radius:    14px;
    --font-serif: 'Playfair Display', Georgia, serif;
    --font-sans:  'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font-sans);
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── HEADER ── */
  .header {
    background: linear-gradient(160deg, var(--forest) 0%, var(--moss) 60%, var(--water) 100%);
    padding: 52px 20px 28px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 28px;
    background: var(--cream);
    clip-path: ellipse(55% 100% at 50% 100%);
  }
  .header-inner {
    position: relative;
    max-width: 600px;
    margin: 0 auto;
  }
  .header-eyebrow {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 6px;
  }
  .header h1 {
    font-family: var(--font-serif);
    font-size: clamp(24px, 6vw, 34px);
    font-weight: 600;
    color: var(--cream);
    line-height: 1.15;
    margin-bottom: 14px;
  }

  /* ── LOCATION BAR ── */
  .location-bar {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .loc-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px;
    color: var(--mist);
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background 0.2s;
    flex: 1;
    max-width: 240px;
  }
  .loc-pill:active { background: rgba(255,255,255,0.2); }
  .loc-pill svg { flex-shrink: 0; opacity: 0.8; }
  .region-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 7px 14px;
    font-size: 13px;
    color: var(--mist);
    cursor: pointer;
    backdrop-filter: blur(4px);
    transition: background 0.2s;
    font-family: var(--font-sans);
  }
  .region-btn:active { background: rgba(255,255,255,0.2); }

  /* ── PAGE BODY ── */
  .page-body {
    max-width: 600px;
    margin: 0 auto;
    padding: 20px 14px;
  }

  /* ── MAP ── */
  .map-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 16px;
    position: relative;
  }
  #map {
    height: 260px;
    width: 100%;
    z-index: 1;
  }
  .map-legend {
    padding: 10px 14px;
    display: flex;
    gap: 14px;
    border-top: 1px solid var(--border);
    background: var(--parchment);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: var(--stone);
  }
  .legend-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ── SUMMARY STATS ── */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
    box-shadow: var(--shadow);
  }
  .stat-num {
    font-family: var(--font-serif);
    font-size: 22px;
    font-weight: 600;
    color: var(--forest);
    line-height: 1;
    margin-bottom: 3px;
  }
  .stat-label {
    font-size: 11px;
    color: var(--stone);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  /* ── SECTION HEADING ── */
  .section-heading {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    margin-top: 4px;
  }
  .section-heading h2 {
    font-family: var(--font-serif);
    font-size: 17px;
    font-weight: 600;
    color: var(--forest);
  }
  .section-heading span {
    font-size: 12px;
    color: var(--stone);
  }

  /* ── SEARCH ── */
  .search-wrap {
    position: relative;
    margin-bottom: 12px;
  }
  .search-wrap svg {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--stone);
    pointer-events: none;
  }
  .search-input {
    width: 100%;
    padding: 10px 14px 10px 36px;
    font-family: var(--font-sans);
    font-size: 14px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    outline: none;
    color: var(--ink);
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .search-input:focus {
    border-color: var(--fern);
    box-shadow: 0 0 0 3px rgba(61,107,54,0.10);
  }
  .search-input::placeholder { color: var(--stone); }

  /* ── HOT THIS WEEK ── */
  .hot-scroll {
    display: flex;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 18px;
    scrollbar-width: none;
  }
  .hot-scroll::-webkit-scrollbar { display: none; }
  .hot-card {
    flex-shrink: 0;
    width: 150px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px;
    box-shadow: var(--shadow);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .hot-card:active { transform: scale(0.97); }
  .hot-badge {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 5px;
  }
  .hot-river {
    font-family: var(--font-serif);
    font-size: 14px;
    font-weight: 600;
    color: var(--forest);
    line-height: 1.3;
    margin-bottom: 6px;
  }
  .hot-stat {
    font-size: 11px;
    color: var(--stone);
    line-height: 1.6;
  }
  .hot-stat strong { color: var(--fern); font-weight: 500; }

  /* ── HATCH PILLS ── */
  .hatch-scroll {
    display: flex;
    gap: 7px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 18px;
    scrollbar-width: none;
  }
  .hatch-scroll::-webkit-scrollbar { display: none; }
  .hatch-pill {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 5px;
    background: #fff8f0;
    border: 1px solid rgba(201,132,58,0.25);
    border-radius: 20px;
    padding: 6px 12px;
    font-size: 12px;
    color: var(--amber);
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .hatch-pill:active { background: #f5ede0; }
  .hatch-pill.active {
    background: var(--amber);
    color: white;
    border-color: var(--amber);
  }
  .hatch-count {
    background: rgba(201,132,58,0.15);
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 10px;
  }
  .hatch-pill.active .hatch-count {
    background: rgba(255,255,255,0.25);
  }

  /* ── RIVER CARDS ── */
  .river-list { display: flex; flex-direction: column; gap: 10px; }
  .river-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.15s;
    animation: fadeIn 0.3s ease both;
  }
  .river-card:active { transform: scale(0.99); }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .river-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 14px 14px 10px;
  }
  .river-name {
    font-family: var(--font-serif);
    font-size: 16px;
    font-weight: 600;
    color: var(--forest);
    margin-bottom: 3px;
  }
  .river-meta {
    font-size: 12px;
    color: var(--stone);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .river-meta span { display: flex; align-items: center; gap: 3px; }
  .river-badge {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 10px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-hot   { background: #fff3e0; color: #c9843a; border: 1px solid rgba(201,132,58,0.25); }
  .badge-fresh { background: #e8f4e5; color: #3d6b36; border: 1px solid rgba(61,107,54,0.2); }
  .badge-cold  { background: #e3eef7; color: #2a4a5e; border: 1px solid rgba(42,74,94,0.2); }

  .river-conditions {
    display: flex;
    gap: 0;
    border-top: 1px solid var(--border);
    background: var(--parchment);
  }
  .cond-cell {
    flex: 1;
    padding: 8px 10px;
    text-align: center;
    border-right: 1px solid var(--border);
  }
  .cond-cell:last-child { border-right: none; }
  .cond-val {
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1;
    margin-bottom: 3px;
  }
  .cond-key {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--stone);
  }

  .river-hatches {
    padding: 8px 14px 10px;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    border-top: 1px solid var(--border);
  }
  .mini-hatch {
    font-size: 11px;
    background: #fff8f0;
    border: 1px solid rgba(201,132,58,0.2);
    border-radius: 10px;
    padding: 2px 8px;
    color: var(--amber);
  }
  .mini-fly {
    font-size: 11px;
    background: var(--parchment);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2px 8px;
    color: var(--stone);
  }

  .river-footer {
    padding: 6px 14px 10px;
    font-size: 11px;
    color: var(--stone);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .report-count {
    font-weight: 500;
    color: var(--fern);
  }

  /* ── EMPTY / LOADING ── */
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--stone);
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .empty-state h3 {
    font-family: var(--font-serif);
    font-size: 17px;
    color: var(--forest);
    margin-bottom: 6px;
  }
  .empty-state p { font-size: 13px; line-height: 1.6; }
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 36px;
    gap: 10px;
    color: var(--stone);
    font-size: 13px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .spinner {
    width: 26px; height: 26px;
    border: 2px solid var(--border);
    border-top-color: var(--fern);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── REGION SHEET ── */
  .sheet-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    display: flex;
    align-items: flex-end;
  }
  .sheet {
    background: var(--card-bg);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 40px;
    width: 100%;
    max-height: 75vh;
    overflow-y: auto;
  }
  .sheet h3 {
    font-family: var(--font-serif);
    font-size: 18px;
    font-weight: 600;
    color: var(--forest);
    margin-bottom: 16px;
  }
  .sheet-option {
    padding: 13px 4px;
    border-bottom: 1px solid var(--border);
    font-size: 15px;
    cursor: pointer;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: color 0.15s;
  }
  .sheet-option:last-child { border-bottom: none; }
  .sheet-option.selected { color: var(--fern); font-weight: 500; }
  .sheet-option:active { color: var(--fern); }

  /* ── NAV BAR ── */
  .nav-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--card-bg);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 10px 0 max(10px, env(safe-area-inset-bottom));
    z-index: 100;
    box-shadow: 0 -4px 20px rgba(26,46,26,0.08);
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    font-weight: 500;
    color: var(--stone);
    text-decoration: none;
    cursor: pointer;
    transition: color 0.15s;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .nav-item.active { color: var(--fern); }
  .nav-log {
    width: 44px; height: 44px;
    background: var(--forest);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-top: -20px;
    box-shadow: 0 4px 14px rgba(26,46,26,0.35);
    border: 3px solid var(--cream);
  }

  /* Leaflet marker overrides */
  .river-marker {
    background: var(--fern);
    border: 2px solid white;
    border-radius: 50%;
    width: 12px; height: 12px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .river-marker.hot { background: var(--amber); }
  .leaflet-popup-content-wrapper {
    border-radius: 10px !important;
    font-family: var(--font-sans) !important;
    font-size: 13px !important;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15) !important;
  }
  .leaflet-popup-content { margin: 10px 14px !important; }
  .popup-river { font-family: var(--font-serif); font-size: 14px; font-weight: 600; color: var(--forest); margin-bottom: 4px; }
  .popup-detail { font-size: 12px; color: var(--stone); line-height: 1.7; }

  /* ── RIVER REPORTS SHEET ── */
  .rsheet-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 200;
    display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .rsheet-overlay.open { opacity: 1; pointer-events: all; }
  .rsheet {
    background: var(--cream); border-radius: 20px 20px 0 0;
    width: 100%; max-height: 92vh; overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    padding-bottom: 40px;
  }
  .rsheet-overlay.open .rsheet { transform: translateY(0); }
  .rsheet-handle { display:flex; justify-content:center; padding:12px 0 6px; }
  .rsheet-handle div { width:36px; height:4px; background:var(--border); border-radius:2px; }
  .rsheet-header {
    padding: 4px 18px 14px; border-bottom: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .rsheet-river { font-family: var(--font-serif); font-size: 22px; font-weight: 600; color: var(--forest); margin-bottom: 3px; }
  .rsheet-sub { font-size: 13px; color: var(--stone); }
  .rsheet-close {
    width: 30px; height: 30px; border-radius: 50%; background: var(--parchment);
    border: 1px solid var(--border); display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; color: var(--stone); flex-shrink: 0; margin-top: 2px;
  }

  /* Report rows inside sheet */
  .rsheet-body { padding: 14px 16px; }
  .rsheet-section-title {
    font-family: var(--font-serif); font-size: 15px; font-weight: 600;
    color: var(--forest); margin-bottom: 10px;
  }
  .report-row {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 10px; overflow: hidden;
    cursor: pointer; transition: transform 0.15s;
  }
  .report-row:active { transform: scale(0.99); }
  .report-row-top {
    display: grid; grid-template-columns: 1fr auto;
    padding: 12px 14px 8px; gap: 8px; align-items: start;
  }
  .report-row-date { font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 2px; }
  .report-row-meta { font-size: 12px; color: var(--stone); line-height: 1.6; }
  .report-row-right { text-align: right; }
  .report-row-fish { font-family: var(--font-serif); font-size: 18px; font-weight: 600; color: var(--fern); }
  .report-row-fish small { font-family: var(--font-sans); font-size: 10px; color: var(--stone); display: block; font-weight: 400; }
  .report-row-stars { display: flex; gap: 1px; justify-content: flex-end; margin-top: 2px; }
  .rstar { font-size: 11px; color: #ddd; }
  .rstar.lit { color: var(--amber); }
  .report-row-conds {
    display: flex; background: var(--parchment); border-top: 1px solid var(--border); gap: 0;
  }
  .rcond { flex: 1; text-align: center; padding: 7px 8px; border-right: 1px solid var(--border); }
  .rcond:last-child { border-right: none; }
  .rcond-val { font-size: 13px; font-weight: 500; color: var(--ink); }
  .rcond-key { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--stone); }
  .report-row-flies {
    display: flex; flex-wrap: wrap; gap: 5px;
    padding: 8px 14px 10px; border-top: 1px solid var(--border);
  }
  .rflyTag { font-size: 11px; background: var(--parchment); border: 1px solid var(--border); border-radius: 10px; padding: 2px 8px; color: var(--stone); }
  .rhatchTag { font-size: 11px; background: #fff8f0; border: 1px solid rgba(201,132,58,0.2); border-radius: 10px; padding: 2px 8px; color: var(--amber); }

  /* Full report sheet (second level) */
  .freport-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 300;
    display: flex; align-items: flex-end;
    opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .freport-overlay.open { opacity: 1; pointer-events: all; }
  .freport-sheet {
    background: var(--cream); border-radius: 20px 20px 0 0;
    width: 100%; max-height: 92vh; overflow-y: auto;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
    padding-bottom: 40px;
  }
  .freport-overlay.open .freport-sheet { transform: translateY(0); }

  /* Shared report sheet section styles */
  .sheet-section { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); margin: 10px 14px 0; overflow: hidden; }
  .sheet-section-title { display:flex; align-items:center; gap:8px; padding:12px 14px; border-bottom:1px solid var(--border); background:var(--parchment); }
  .sheet-section-title span { font-family:var(--font-serif); font-size:14px; font-weight:600; color:var(--forest); }

  .fly-table { width:100%; border-collapse:collapse; font-size:13px; }

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// SUPABASE_URL and SUPABASE_KEY defined in auth.js

let allLogs       = [];
let riverMap      = {};   // river name → aggregated data
let userLat       = null;
let userLng       = null;
let activeHatch   = null;
let activeRegion  = null;
let searchTerm    = '';
let map;
let userMarker;

// ── REGIONS — full US states + popular fishing regions ──
const REGIONS = [
  'All regions',
  '— Popular fishing regions —',
  'Catskills, NY', 'Adirondacks, NY', 'Pocono Mountains, PA',
  'Driftless Area', 'Black Hills, SD', 'Ozarks',
  'Blue Ridge Mountains', 'Great Smoky Mountains',
  'Rocky Mountain Front', 'Pacific Northwest', 'Alaska',
  '— US States —',
  'Alabama', 'Alaska', 'Arizona', 'Arkansas', 'California',
  'Colorado', 'Connecticut', 'Delaware', 'Florida', 'Georgia',
  'Hawaii', 'Idaho', 'Illinois', 'Indiana', 'Iowa',
  'Kansas', 'Kentucky', 'Louisiana', 'Maine', 'Maryland',
  'Massachusetts', 'Michigan', 'Minnesota', 'Mississippi', 'Missouri',
  'Montana', 'Nebraska', 'Nevada', 'New Hampshire', 'New Jersey',
  'New Mexico', 'New York', 'North Carolina', 'North Dakota', 'Ohio',
  'Oklahoma', 'Oregon', 'Pennsylvania', 'Rhode Island', 'South Carolina',
  'South Dakota', 'Tennessee', 'Texas', 'Utah', 'Vermont',
  'Virginia', 'Washington', 'West Virginia', 'Wisconsin', 'Wyoming'
];

// ── INIT MAP ──
function initMap() {
  map = L.map('map', { zoomControl: false, attributionControl: false })
    .setView([42.0, -74.5], 8);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
    maxZoom: 18
  }).addTo(map);

  L.control.zoom({ position: 'bottomright' }).addTo(map);
}

// ── FETCH DATA ──
async function fetchData() {
  try {
    const session = (() => { try { return JSON.parse(localStorage.getItem('sb_session')); } catch(e) { return null; } })();
    const token   = session?.access_token || SUPABASE_KEY;

    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/trip_logs?select=*&order=trip_date.desc&limit=500`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + token } }
    );
    allLogs = await res.json();
    aggregateRivers();
    renderAll();
  } catch (e) {
    document.getElementById('river-list').innerHTML =
      `<div class="empty-state"><h3>Couldn't load data</h3><p>Check your connection and refresh.</p></div>`;
    console.error(e);
  }
}

// ── AGGREGATE by river ──
function aggregateRivers() {
  riverMap = {};
  const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString().split('T')[0];

  allLogs.forEach(log => {
    const name = log.river || 'Unknown';
    if (!riverMap[name]) {
      riverMap[name] = {
        name,
        reports: 0,
        reportsThisWeek: 0,
        totalFish: 0,
        lastDate: null,
        lastFlow: null,
        lastWaterTemp: null,
        lastAirTemp: null,
        lastTempUnit: 'F',
        hatches: {},
        flies: {},
        methods: {},
        lat: log.latitude,
        lng: log.longitude,
        region: guessRegion(log.latitude, log.longitude),
        ratings: []
      };
    }
    const r = riverMap[name];
    r.reports++;
    if (log.trip_date >= weekAgo) r.reportsThisWeek++;
    if (!r.lastDate || log.trip_date > r.lastDate) {
      r.lastDate    = log.trip_date;
      r.lastFlow    = log.flow_cfs;
      r.lastWaterTemp = log.water_temp;
      r.lastAirTemp = log.air_temp;
      r.lastTempUnit = log.temp_unit || 'F';
      if (log.latitude)  r.lat = log.latitude;
      if (log.longitude) r.lng = log.longitude;
    }
    if (log.fish_counts) {
      Object.values(log.fish_counts).forEach(v => r.totalFish += parseInt(v) || 0);
    }
    (log.hatches || []).forEach(h => { r.hatches[h] = (r.hatches[h] || 0) + 1; });
    (log.flies_used || []).forEach(f => {
      if (f.pattern) r.flies[f.pattern] = (r.flies[f.pattern] || 0) + 1;
    });
    if (log.fishing_method) r.methods[log.fishing_method] = (r.methods[log.fishing_method] || 0) + 1;
    if (log.rating) r.ratings.push(log.rating);
  });
}

function guessRegion(lat, lng) {
  if (!lat || !lng) return null;
  // Sub-regions first (more specific)
  if (lat > 41.5 && lat < 42.5 && lng > -75.2 && lng < -73.8) return 'Catskills, NY';
  if (lat > 43   && lat < 45   && lng > -75   && lng < -73)   return 'Adirondacks, NY';
  // US States by approximate bounding boxes
  if (lat > 30.2 && lat < 35.0 && lng > -88.5 && lng < -84.9) return 'Alabama';
  if (lat > 54.5 && lat < 71.5 && lng > -168  && lng < -130)  return 'Alaska';
  if (lat > 31.3 && lat < 37.0 && lng > -114.8 && lng < -109) return 'Arizona';
  if (lat > 33.0 && lat < 36.5 && lng > -94.6 && lng < -89.6) return 'Arkansas';
  if (lat > 32.5 && lat < 42.0 && lng > -124.5 && lng < -114) return 'California';
  if (lat > 36.9 && lat < 41.0 && lng > -109.1 && lng < -102) return 'Colorado';
  if (lat > 40.9 && lat < 42.1 && lng > -73.7 && lng < -71.8) return 'Connecticut';
  if (lat > 38.4 && lat < 39.8 && lng > -75.8 && lng < -75.0) return 'Delaware';
  if (lat > 24.5 && lat < 31.0 && lng > -87.6 && lng < -80.0) return 'Florida';
  if (lat > 30.4 && lat < 35.0 && lng > -85.6 && lng < -80.8) return 'Georgia';
  if (lat > 43.0 && lat < 47.0 && lng > -117.2 && lng < -111) return 'Idaho';
  if (lat > 36.9 && lat < 42.5 && lng > -91.5 && lng < -87.0) return 'Illinois';
  if (lat > 37.8 && lat < 41.8 && lng > -88.1 && lng < -84.8) return 'Indiana';
  if (lat > 40.4 && lat < 43.5 && lng > -96.6 && lng < -90.1) return 'Iowa';
  if (lat > 36.9 && lat < 40.0 && lng > -102.1 && lng < -94.6) return 'Kansas';
  if (lat > 36.5 && lat < 39.1 && lng > -89.6 && lng < -81.9) return 'Kentucky';
  if (lat > 28.9 && lat < 33.0 && lng > -94.0 && lng < -88.8) return 'Louisiana';
  if (lat > 43.0 && lat < 47.5 && lng > -71.1 && lng < -66.9) return 'Maine';
  if (lat > 37.9 && lat < 39.7 && lng > -79.5 && lng < -75.0) return 'Maryland';
  if (lat > 41.2 && lat < 42.9 && lng > -73.5 && lng < -69.9) return 'Massachusetts';
  if (lat > 41.7 && lat < 48.3 && lng > -90.4 && lng < -82.4) return 'Michigan';
  if (lat > 43.5 && lat < 49.4 && lng > -97.2 && lng < -89.5) return 'Minnesota';
  if (lat > 30.1 && lat < 35.0 && lng > -91.7 && lng < -88.1) return 'Mississippi';
  if (lat > 35.9 && lat < 40.6 && lng > -95.8 && lng < -89.1) return 'Missouri';
  if (lat > 44.4 && lat < 49.0 && lng > -116.1 && lng < -104) return 'Montana';
  if (lat > 39.9 && lat < 43.0 && lng > -104.1 && lng < -95.3) return 'Nebraska';
  if (lat > 35.0 && lat < 42.0 && lng > -120.0 && lng < -114) return 'Nevada';
  if (lat > 42.7 && lat < 45.3 && lng > -72.6 && lng < -70.6) return 'New Hampshire';
  if (lat > 38.9 && lat < 41.4 && lng > -75.6 && lng < -73.9) return 'New Jersey';
  if (lat > 31.3 && lat < 37.0 && lng > -109.1 && lng < -103) return 'New Mexico';
  if (lat > 40.5 && lat < 45.0 && lng > -79.8 && lng < -71.9) return 'New York';
  if (lat > 33.8 && lat < 36.6 && lng > -84.3 && lng < -75.5) return 'North Carolina';
  if (lat > 45.9 && lat < 49.0 && lng > -104.1 && lng < -96.6) return 'North Dakota';
  if (lat > 38.4 && lat < 42.0 && lng > -84.8 && lng < -80.5) return 'Ohio';
  if (lat > 33.6 && lat < 37.0 && lng > -103.0 && lng < -94.4) return 'Oklahoma';
  if (lat > 41.9 && lat < 46.3 && lng > -124.6 && lng < -116) return 'Oregon';
  if (lat > 39.7 && lat < 42.3 && lng > -80.5 && lng < -74.7) return 'Pennsylvania';
  if (lat > 41.1 && lat < 42.0 && lng > -71.9 && lng < -71.1) return 'Rhode Island';
  if (lat > 32.0 && lat < 35.2 && lng > -83.4 && lng < -78.5) return 'South Carolina';
  if (lat > 42.5 && lat < 45.9 && lng > -104.1 && lng < -96.4) return 'South Dakota';
  if (lat > 34.9 && lat < 36.7 && lng > -90.3 && lng < -81.6) return 'Tennessee';
  if (lat > 25.8 && lat < 36.5 && lng > -106.7 && lng < -93.5) return 'Texas';
  if (lat > 36.9 && lat < 42.0 && lng > -114.1 && lng < -109) return 'Utah';
  if (lat > 42.7 && lat < 45.0 && lng > -73.4 && lng < -71.5) return 'Vermont';
  if (lat > 36.5 && lat < 39.5 && lng > -83.7 && lng < -75.2) return 'Virginia';
  if (lat > 45.5 && lat < 49.0 && lng > -124.8 && lng < -116) return 'Washington';
  if (lat > 37.2 && lat < 40.6 && lng > -82.7 && lng < -77.7) return 'West Virginia';
  if (lat > 42.5 && lat < 47.1 && lng > -92.9 && lng < -86.2) return 'Wisconsin';
  if (lat > 40.9 && lat < 45.0 && lng > -111.1 && lng < -104) return 'Wyoming';
  return null;
}

// ── RENDER ALL ──
function renderAll() {
  renderStats();
  renderHotCards();
  renderHatches();
  renderRiverList();
  renderMapMarkers();
}

function renderStats() {
  const rivers  = Object.keys(riverMap).length;
  const total   = allLogs.length;
  const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString().split('T')[0];
  const week    = allLogs.filter(l => l.trip_date >= weekAgo).length;
  document.getElementById('stat-waters').textContent  = rivers || '—';
  document.getElementById('stat-reports').textContent = total  || '—';
  document.getElementById('stat-week').textContent    = week   || '—';
}

// ── HOT CARDS ──
function renderHotCards() {
  const sorted = Object.values(riverMap)
    .filter(r => r.reportsThisWeek > 0)
    .sort((a, b) => b.reportsThisWeek - a.reportsThisWeek)
    .slice(0, 8);

  const el = document.getElementById('hot-scroll');
  if (!sorted.length) {
    el.innerHTML = `<div style="font-size:13px;color:var(--stone);padding:4px 0">No reports this week yet — be the first!</div>`;
    return;
  }
  el.innerHTML = sorted.map(r => {
    const topHatch = Object.entries(r.hatches).sort((a,b)=>b[1]-a[1])[0]?.[0] || null;
    const topFly   = Object.entries(r.flies).sort((a,b)=>b[1]-a[1])[0]?.[0] || null;
    const avgRating = r.ratings.length ? (r.ratings.reduce((a,b)=>a+b,0)/r.ratings.length).toFixed(1) : null;
    return `
      <div class="hot-card" onclick="scrollToRiver('${r.name.replace(/'/g,"\\'")}')">
        <div class="hot-badge">🔥 ${r.reportsThisWeek} report${r.reportsThisWeek>1?'s':''} this week</div>
        <div class="hot-river">${r.name}</div>
        <div class="hot-stat">
          ${r.totalFish ? `<strong>${r.totalFish}</strong> fish reported<br>` : ''}
          ${topHatch ? `Hatch: <strong>${topHatch}</strong><br>` : ''}
          ${topFly   ? `Fly: <strong>${topFly}</strong><br>` : ''}
          ${avgRating ? `★ ${avgRating}` : ''}
        </div>
      </div>`;
  }).join('');
}

// ── HATCH PILLS ──
function renderHatches() {
  const hatchTotals = {};
  allLogs.forEach(log => {
    (log.hatches || []).forEach(h => { hatchTotals[h] = (hatchTotals[h] || 0) + 1; });
  });
  const sorted = Object.entries(hatchTotals).sort((a,b) => b[1]-a[1]);
  const el = document.getElementById('hatch-scroll');
  if (!sorted.length) {
    el.innerHTML = `<div style="font-size:13px;color:var(--stone)">No hatches reported yet</div>`;
    return;
  }
  el.innerHTML = sorted.map(([h, count]) => `
    <div class="hatch-pill ${activeHatch===h?'active':''}" onclick="filterByHatch('${h}')">
      ${h} <span class="hatch-count">${count}</span>
    </div>`).join('');
}

function filterByHatch(h) {
  activeHatch = activeHatch === h ? null : h;
  document.getElementById('hatch-filter-label').textContent = activeHatch ? `Clear filter` : '';
  renderHatches();
  renderRiverList();
}
function clearHatchFilter() { filterByHatch(activeHatch); }

// ── RIVER LIST ──
function getFilteredRivers() {
  let rivers = Object.values(riverMap);

  if (activeHatch) {
    rivers = rivers.filter(r => r.hatches[activeHatch]);
  }
  if (activeRegion && activeRegion !== 'All regions') {
    rivers = rivers.filter(r => r.region === activeRegion);
  }
  if (searchTerm) {
    rivers = rivers.filter(r =>
      r.name.toLowerCase().includes(searchTerm) ||
      (r.region || '').toLowerCase().includes(searchTerm)
    );
  }
  if (userLat && userLng) {
    rivers.forEach(r => {
      r._dist = r.lat && r.lng
        ? Math.sqrt(Math.pow(r.lat - userLat, 2) + Math.pow(r.lng - userLng, 2))
        : 999;
    });
    rivers.sort((a, b) => a._dist - b._dist);
  } else {
    rivers.sort((a, b) => b.reports - a.reports);
  }
  return rivers;
}

function renderRiverList() {
  const rivers = getFilteredRivers();
  const el = document.getElementById('river-list');
  document.getElementById('river-count').textContent =
    `${rivers.length} water${rivers.length !== 1 ? 's' : ''}`;

  if (!rivers.length) {
    el.innerHTML = `<div class="empty-state"><h3>No waters found</h3><p>Try a different filter or be the first to log a trip here.</p></div>`;
    return;
  }

  const weekAgo = new Date(Date.now() - 7 * 86400000).toISOString().split('T')[0];

  el.innerHTML = rivers.map((r, i) => {
    const topHatches = Object.entries(r.hatches).sort((a,b)=>b[1]-a[1]).slice(0,3).map(([h])=>h);
    const topFlies   = Object.entries(r.flies).sort((a,b)=>b[1]-a[1]).slice(0,2).map(([f])=>f);
    const topMethod  = Object.entries(r.methods).sort((a,b)=>b[1]-a[1])[0]?.[0] || null;

    const badge = r.reportsThisWeek >= 2
      ? `<span class="river-badge badge-hot">🔥 Hot</span>`
      : r.lastDate >= weekAgo
      ? `<span class="river-badge badge-fresh">New report</span>`
      : '';

    const distText = r._dist && r._dist < 999
      ? `~${Math.round(r._dist * 69)} mi away`
      : r.region || '';

    const dateText = r.lastDate
      ? new Date(r.lastDate + 'T12:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' })
      : '—';

    return `
      <div class="river-card" style="animation-delay:${i*0.04}s" data-river="${r.name.replace(/"/g,'&quot;')}" onclick="openRiverReports(this.dataset.river)">`
        <div class="river-card-top">
          <div>
            <div class="river-name">${r.name}</div>
            <div class="river-meta">
              <span>
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/></svg>
                ${distText}
              </span>
              <span>${r.reports} report${r.reports!==1?'s':''}</span>
              ${topMethod ? `<span>${topMethod}</span>` : ''}
            </div>
          </div>
          ${badge}
        </div>
        <div class="river-conditions">
          <div class="cond-cell">
            <div class="cond-val">${r.lastFlow ? Math.round(r.lastFlow) + ' cfs' : '—'}</div>
            <div class="cond-key">Flow</div>
          </div>
          <div class="cond-cell">
            <div class="cond-val">${r.lastWaterTemp ? Math.round(r.lastWaterTemp) + '°' + r.lastTempUnit : '—'}</div>
            <div class="cond-key">Water</div>
          </div>
          <div class="cond-cell">
            <div class="cond-val">${r.lastAirTemp ? Math.round(r.lastAirTemp) + '°' + r.lastTempUnit : '—'}</div>
            <div class="cond-key">Air</div>
          </div>
          <div class="cond-cell">
            <div class="cond-val">${dateText}</div>
            <div class="cond-key">Last report</div>
          </div>
        </div>
        ${topHatches.length || topFlies.length ? `
        <div class="river-hatches">
          ${topHatches.map(h => `<span class="mini-hatch">${h}</span>`).join('')}
          ${topFlies.map(f => `<span class="mini-fly">${f}</span>`).join('')}
        </div>` : ''}
      </div>`;
  }).join('');
}

function filterRivers(val) {
  searchTerm = val.toLowerCase();
  renderRiverList();
}

function scrollToRiver(name) {
  const cards = document.querySelectorAll('.river-card');
  cards.forEach(card => {
    if (card.querySelector('.river-name')?.textContent === name) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.style.boxShadow = '0 0 0 2px var(--fern)';
      setTimeout(() => card.style.boxShadow = '', 1500);
    }
  });
}

function goToRiverFeed(name) {
  openRiverReports(name);
}

// ── RIVER REPORTS SHEET ──
function openRiverReports(riverName) {
  const river   = riverMap[riverName];
  const reports = allLogs.filter(l => l.river === riverName)
                         .sort((a,b) => b.trip_date > a.trip_date ? 1 : -1);

  document.getElementById('rsheet-river').textContent = riverName;
  document.getElementById('rsheet-sub').textContent =
    `${reports.length} report${reports.length !== 1 ? 's' : ''}` +
    (river?.lastFlow ? ` · Last flow: ${Math.round(river.lastFlow)} cfs` : '');

  const body = document.getElementById('rsheet-body');

  if (!reports.length) {
    body.innerHTML = `<div style="text-align:center;padding:30px;font-size:13px;color:var(--stone)">No reports yet for this river.</div>`;
  } else {
    body.innerHTML = `<div class="rsheet-section-title">Recent reports</div>` +
      reports.map(log => {
        let fishTotal = 0;
        if (log.fish_counts) Object.values(log.fish_counts).forEach(v => fishTotal += parseInt(v)||0);
        const dateObj = log.trip_date ? new Date(log.trip_date + 'T12:00:00') : null;
        const dateStr = dateObj ? dateObj.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}) : '—';
        const stars   = [1,2,3,4,5].map(n=>`<span class="rstar${log.rating&&n<=log.rating?' lit':''}">★</span>`).join('');
        const flies   = (log.flies_used||[]).slice(0,2).map(f=>`<span class="rflyTag">${f.pattern||'—'}</span>`).join('');
        const hatches = (log.hatches||[]).slice(0,3).map(h=>`<span class="rhatchTag">${h}</span>`).join('');
        const hasTags = flies || hatches;

        return `
          <div class="report-row" onclick="openFullReport('${log.id}')">
            <div class="report-row-top">
              <div>
                <div class="report-row-date">${dateStr}</div>
                <div class="report-row-meta">
                  ${log.section || ''}
                  ${log.fishing_method ? (log.section?'·':'') + ' ' + log.fishing_method : ''}
                  ${log.start_time ? '<br>' + formatTime(log.start_time) + (log.end_time?' – '+formatTime(log.end_time):'') : ''}
                </div>
              </div>
              <div class="report-row-right">
                <div class="report-row-fish">${fishTotal||'—'}<small>fish</small></div>
                <div class="report-row-stars">${stars}</div>
              </div>
            </div>
            <div class="report-row-conds">
              <div class="rcond"><div class="rcond-val">${log.flow_cfs?Math.round(log.flow_cfs)+' cfs':'—'}</div><div class="rcond-key">Flow</div></div>
              <div class="rcond"><div class="rcond-val">${log.water_temp?Math.round(log.water_temp)+'°'+(log.temp_unit||'F'):'—'}</div><div class="rcond-key">Water</div></div>
              <div class="rcond"><div class="rcond-val">${log.air_temp?Math.round(log.air_temp)+'°'+(log.temp_unit||'F'):'—'}</div><div class="rcond-key">Air</div></div>
              <div class="rcond"><div class="rcond-val">${log.visibility==='Public'?'🌍':log.visibility==='Private'?'🔒':'👥'}</div><div class="rcond-key">Visibility</div></div>
            </div>
            ${hasTags ? `<div class="report-row-flies">${hatches}${flies}</div>` : ''}
          </div>`;
      }).join('');
  }

  document.getElementById('rsheet-overlay').classList.add('open');
}

function closeRsheet() { document.getElementById('rsheet-overlay').classList.remove('open'); }
function closeRsheetIfBg(e) { if (e.target === document.getElementById('rsheet-overlay')) closeRsheet(); }

// ── FULL REPORT ──
function openFullReport(id) {
  const log = allLogs.find(l => l.id === id);
  if (!log) return;

  const dateObj = log.trip_date ? new Date(log.trip_date + 'T12:00:00') : null;
  const dateStr = dateObj ? dateObj.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}) : '—';
  let fishTotal = 0;
  if (log.fish_counts) Object.values(log.fish_counts).forEach(v => fishTotal += parseInt(v)||0);
  const speciesRows = log.fish_counts ? Object.entries(log.fish_counts).map(([sp,ct])=>`<tr><td>${sp}</td><td>${ct}</td></tr>`).join('') : '';
  const flyRows = (log.flies_used||[]).map(f=>`<tr><td>${f.pattern||'—'}</td><td>${f.size||'—'}</td><td>${f.caught||'0'}</td><td>${f.notes||''}</td></tr>`).join('');
  const stars   = [1,2,3,4,5].map(n=>`<span class="sheet-star${log.rating&&n<=log.rating?' lit':''}">★</span>`).join('');
  const hatchChips = (log.hatches||[]).map(h=>`<span class="sheet-chip hatch">${h}</span>`).join('');
  const skyChips   = (log.sky||[]).map(s=>`<span class="sheet-chip">${s}</span>`).join('');
  const photos     = (log.photo_urls||[]).map(url=>`<img class="sheet-photo" src="${url}" alt="Trip photo">`).join('');
  const privacyIcon = log.visibility==='Public'?'🌍':log.visibility==='Private'?'🔒':'👥';

  document.getElementById('freport-content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 18px 0">
      <button onclick="closeFullReport()" style="background:none;border:none;font-size:13px;color:var(--fern);cursor:pointer;font-family:var(--font-sans);padding:8px 0">← Back to reports</button>
      <div class="rsheet-close" onclick="closeFreport()">✕</div>
    </div>
    <div style="padding:4px 18px 14px;border-bottom:1px solid var(--border)">
      <div style="font-family:var(--font-serif);font-size:22px;font-weight:600;color:var(--forest);margin-bottom:3px">${log.river||'Unknown water'}</div>
      <div style="font-size:13px;color:var(--stone)">${log.section?log.section+' · ':''}${dateStr}</div>
      <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center">
        ${log.fishing_method?`<span class="sheet-chip" style="margin:0">${log.fishing_method}</span>`:''}
        <span class="privacy-badge">${privacyIcon} ${log.visibility||'Public'}</span>
      </div>
    </div>
    ${photos?`<div class="sheet-photos">${photos}</div>`:''}
    <div class="sheet-section">
      <div class="sheet-section-title">
        <div class="sheet-section-icon" style="background:#e3eef7"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3d7a9c" stroke-width="2"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9z"/></svg></div>
        <span>Conditions</span>
      </div>
      <div class="data-grid">
        <div class="data-cell"><label>Water temp</label><p>${log.water_temp?log.water_temp+'°'+(log.temp_unit||'F'):'—'}</p></div>
        <div class="data-cell"><label>Air temp</label><p>${log.air_temp?log.air_temp+'°'+(log.temp_unit||'F'):'—'}</p></div>
        <div class="data-cell"><label>Flow</label><p>${log.flow_cfs?Math.round(log.flow_cfs)+' cfs':'—'}</p></div>
        <div class="data-cell"><label>Barometer</label><p>${log.barometric_pressure||'—'}</p></div>
        <div class="data-cell"><label>Water clarity</label><p>${log.water_clarity||'—'}</p></div>
        <div class="data-cell"><label>Wind</label><p>${log.wind||'—'}</p></div>
        ${log.start_time?`<div class="data-cell"><label>On water</label><p>${formatTime(log.start_time)}${log.end_time?' – '+formatTime(log.end_time):''}</p></div>`:''}
      </div>
      ${skyChips?`<div class="sheet-chips">${skyChips}</div>`:''}
    </div>
    ${log.hatches?.length?`
    <div class="sheet-section">
      <div class="sheet-section-title">
        <div class="sheet-section-icon" style="background:#f7ede0"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#c9843a" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
        <span>Hatches</span>
      </div>
      <div class="sheet-chips">${hatchChips}</div>
      ${log.hatch_intensity||log.hatch_timing?`<div class="data-grid">${log.hatch_intensity?`<div class="data-cell"><label>Intensity</label><p>${log.hatch_intensity}</p></div>`:''} ${log.hatch_timing?`<div class="data-cell"><label>Timing</label><p>${log.hatch_timing}</p></div>`:''}</div>`:''}
      ${log.hatch_notes?`<div class="sheet-notes">"${log.hatch_notes}"</div>`:''}
    </div>`:''}
    ${log.fly_line||flyRows?`
    <div class="sheet-section">
      <div class="sheet-section-title">
        <div class="sheet-section-icon" style="background:#e0f0ee"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#2a7a72" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M8 12l2 2 4-4"/></svg></div>
        <span>Fly setup</span>
      </div>
      ${log.fly_line||log.tippet_size?`<div class="data-grid">
        ${log.fly_line?`<div class="data-cell"><label>Line</label><p>${log.fly_line}</p></div>`:''}
        ${log.line_weight?`<div class="data-cell"><label>Weight</label><p>${log.line_weight}</p></div>`:''}
        ${log.leader_length?`<div class="data-cell"><label>Leader</label><p>${log.leader_length}</p></div>`:''}
        ${log.tippet_size?`<div class="data-cell"><label>Tippet</label><p>${log.tippet_size} ${log.tippet_material||''}</p></div>`:''}
      </div>`:''}
      ${flyRows?`<table class="fly-table"><thead><tr><th>Pattern</th><th>Size</th><th>Caught</th><th>Notes</th></tr></thead><tbody>${flyRows}</tbody></table>`:''}
    </div>`:''}
    ${fishTotal>0||speciesRows?`
    <div class="sheet-section">
      <div class="sheet-section-title">
        <div class="sheet-section-icon" style="background:#e8f4e5"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#3d6b36" stroke-width="2"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/></svg></div>
        <span>Catch — ${fishTotal} fish to hand</span>
      </div>
      ${speciesRows?`<table class="fly-table"><thead><tr><th>Species</th><th>Count</th></tr></thead><tbody>${speciesRows}</tbody></table>`:''}
      ${log.biggest_fish_length?`<div class="data-grid"><div class="data-cell"><label>Biggest fish</label><p>${log.biggest_fish_length}"${log.biggest_fish_weight?' · '+log.biggest_fish_weight+' lb':''}</p></div>${log.fishing_method?`<div class="data-cell"><label>Method</label><p>${log.fishing_method}</p></div>`:''}</div>`:''}
    </div>`:''}
    ${log.trip_notes||log.rating?`
    <div class="sheet-section">
      <div class="sheet-section-title">
        <div class="sheet-section-icon" style="background:#ede8f5"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6a4da0" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></div>
        <span>Notes</span>
      </div>
      ${log.rating?`<div class="sheet-stars">${stars}<span style="font-size:12px;color:var(--stone);margin-left:6px">${log.rating}/5</span></div>`:''}
      ${log.trip_notes?`<div class="sheet-notes">"${log.trip_notes}"</div>`:''}
    </div>`:''}`;

  document.getElementById('freport-overlay').classList.add('open');
  document.getElementById('freport-sheet').scrollTop = 0;
}

function closeFullReport() {
  document.getElementById('freport-overlay').classList.remove('open');
}
function closeFreport() {
  document.getElementById('freport-overlay').classList.remove('open');
  closeRsheet();
}
function closeFreportIfBg(e) {
  if (e.target === document.getElementById('freport-overlay')) closeFullReport();
}

function formatTime(t) {
  if (!t) return '';
  const [h, m] = t.split(':');
  const hr = parseInt(h);
  return `${hr % 12 || 12}:${m}${hr < 12 ? 'am' : 'pm'}`;
}

// ── MAP MARKERS ──
let markerLayer = null;

function renderMapMarkers() {
  if (!map) return;

  // Clear existing markers
  if (markerLayer) { markerLayer.clearLayers(); }
  else { markerLayer = L.layerGroup().addTo(map); }

  const rivers = Object.values(riverMap).filter(r => r.lat && r.lng);
  if (!rivers.length) return;

  rivers.forEach(r => {
    const isHot = r.reportsThisWeek >= 1;
    const color  = isHot ? '#c9843a' : '#3d6b36';
    const size   = isHot ? 14 : 10;

    const icon = L.divIcon({
      className: '',
      html: `<div style="
        width:${size}px;height:${size}px;
        background:${color};
        border:2px solid white;
        border-radius:50%;
        box-shadow:0 1px 4px rgba(0,0,0,0.3)">
      </div>`,
      iconSize:   [size, size],
      iconAnchor: [size/2, size/2]
    });

    const topHatch = Object.entries(r.hatches).sort((a,b)=>b[1]-a[1])[0]?.[0] || '—';
    const marker   = L.marker([r.lat, r.lng], { icon });
    marker.bindPopup(`
      <div class="popup-river">${r.name}</div>
      <div class="popup-detail">
        ${r.reports} report${r.reports!==1?'s':''}<br>
        ${r.lastFlow      ? 'Flow: '  + Math.round(r.lastFlow)      + ' cfs<br>' : ''}
        ${r.lastWaterTemp ? 'Water: ' + Math.round(r.lastWaterTemp) + '°' + r.lastTempUnit + '<br>' : ''}
        Hatch: ${topHatch}
      </div>`);
    markerLayer.addLayer(marker);
  });

  // Fit map to show all markers (only if user hasn't set GPS location)
  if (!userLat && !userLng) {
    const lats = rivers.map(r => r.lat);
    const lngs = rivers.map(r => r.lng);
    if (lats.length === 1) {
      map.setView([lats[0], lngs[0]], 11);
    } else {
      map.fitBounds([
        [Math.min(...lats) - 0.3, Math.min(...lngs) - 0.3],
        [Math.max(...lats) + 0.3, Math.max(...lngs) + 0.3]
      ], { maxZoom: 12 });
    }
  }
}

// ── GPS ──
function useGPS() {
  const el = document.getElementById('loc-text');
  el.textContent = 'Finding you…';
  if (!navigator.geolocation) { el.textContent = 'Not available'; return; }
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    el.textContent = 'Near you';

    // Blue user dot on map
    if (userMarker) map.removeLayer(userMarker);
    userMarker = L.circleMarker([userLat, userLng], {
      radius: 7,
      fillColor: '#3d7a9c',
      color: 'white',
      weight: 2,
      fillOpacity: 1
    }).addTo(map);
    map.setView([userLat, userLng], 10);
    renderRiverList();
  }, () => { el.textContent = 'Use my location'; });
}

// ── REGION SHEET ──
function showRegionSheet() {
  const el = document.getElementById('region-options');
  el.innerHTML = REGIONS.map(r => {
    // Section divider rows
    if (r.startsWith('—')) {
      return `<div style="padding:10px 4px 4px;font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:var(--stone)">${r.replace(/—/g,'').trim()}</div>`;
    }
    const isSelected = activeRegion === r || (!activeRegion && r === 'All regions');
    return `
      <div class="sheet-option ${isSelected ? 'selected' : ''}"
        onclick="selectRegion('${r.replace(/'/g,"\\'")}')">
        ${r}
        ${isSelected ? '<span>✓</span>' : ''}
      </div>`;
  }).join('');
  document.getElementById('region-sheet').style.display = 'flex';
}
function hideRegionSheet(e) {
  if (e.target === document.getElementById('region-sheet'))
    document.getElementById('region-sheet').style.display = 'none';
}
function selectRegion(r) {
  if (r.startsWith('—')) return; // ignore divider rows
  activeRegion = r === 'All regions' ? null : r;
  document.getElementById('region-label').textContent = activeRegion ? activeRegion.split(',')[0] : 'By region';
  document.getElementById('region-sheet').style.display = 'none';
  renderRiverList();

  if (activeRegion) {
    // Re-render markers filtered to this region and pan to them
    const rivers = getFilteredRivers().filter(rv => rv.lat && rv.lng);
    if (rivers.length) {
      const lats = rivers.map(rv => rv.lat);
      const lngs = rivers.map(rv => rv.lng);
      map.fitBounds([
        [Math.min(...lats) - 0.3, Math.min(...lngs) - 0.3],
        [Math.max(...lats) + 0.3, Math.max(...lngs) + 0.3]
      ], { maxZoom: 12 });
    }
  } else {
    renderMapMarkers(); // reset to show all
  }
}

// ── INIT ──
initMap();
fetchData();
</script>
